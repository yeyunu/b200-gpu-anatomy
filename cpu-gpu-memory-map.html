  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;body&gt;
&lt;div id=&quot;cpu-gpu-memory-map&quot;&gt;
  &lt;div class=&quot;viz-controls&quot; role=&quot;group&quot; aria-label=&quot;缓存一致性演示步骤&quot;&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-step=&quot;0&quot; aria-pressed=&quot;true&quot;&gt;① 初始 x=10&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-step=&quot;1&quot; aria-pressed=&quot;false&quot;&gt;② CPU 写成20&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-step=&quot;2&quot; aria-pressed=&quot;false&quot;&gt;③ GPU 再读取&lt;/button&gt;
  &lt;/div&gt;

  &lt;p class=&quot;step-detail&quot; aria-live=&quot;polite&quot;&gt;CPU和GPU都曾读取 x，因此各自附近的缓存里都有一份 x=10。&lt;/p&gt;

  &lt;div class=&quot;systems&quot;&gt;
    &lt;section class=&quot;system&quot; aria-labelledby=&quot;traditional-title&quot;&gt;
      &lt;h3 id=&quot;traditional-title&quot;&gt;传统 CPU + PCIe 独立显卡&lt;/h3&gt;
      &lt;p class=&quot;system-note&quot;&gt;两套物理内存 · 跨设备通常需要复制/同步&lt;/p&gt;

      &lt;div class=&quot;machine traditional-machine&quot; role=&quot;img&quot; aria-label=&quot;传统独立显卡电脑：CPU连接DDR，GPU连接独立显存，两者通过PCIe连接&quot;&gt;
        &lt;div class=&quot;local-pair&quot;&gt;
          &lt;div class=&quot;node chip cpu-node&quot;&gt;
            &lt;span class=&quot;node-kind&quot;&gt;CPU芯片&lt;/span&gt;
            &lt;span&gt;通用与控制计算&lt;/span&gt;
            &lt;span class=&quot;cache&quot; data-value=&quot;trad-cpu-cache&quot;&gt;缓存 x=10&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;connector short horizontal&quot; aria-hidden=&quot;true&quot;&gt;&lt;span&gt;内存总线&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;node memory cpu-memory&quot;&gt;
            &lt;span class=&quot;node-kind&quot;&gt;DDR系统内存&lt;/span&gt;
            &lt;span data-value=&quot;trad-ddr&quot;&gt;x=10&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;interconnect pcie-link&quot; aria-hidden=&quot;true&quot;&gt;
          &lt;span class=&quot;arrow&quot;&gt;↕&lt;/span&gt;
          &lt;strong&gt;PCIe&lt;/strong&gt;
          &lt;span&gt;显式复制 / DMA&lt;/span&gt;
        &lt;/div&gt;

        &lt;div class=&quot;local-pair&quot;&gt;
          &lt;div class=&quot;node chip gpu-node&quot;&gt;
            &lt;span class=&quot;node-kind&quot;&gt;独立GPU芯片&lt;/span&gt;
            &lt;span&gt;并行计算&lt;/span&gt;
            &lt;span class=&quot;cache&quot; data-value=&quot;trad-gpu-cache&quot;&gt;缓存 x=10&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;connector short horizontal&quot; aria-hidden=&quot;true&quot;&gt;&lt;span&gt;显存总线&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;node memory gpu-memory&quot;&gt;
            &lt;span class=&quot;node-kind&quot;&gt;GDDR / HBM显存&lt;/span&gt;
            &lt;span data-value=&quot;trad-vram&quot;&gt;副本 x=10&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;result-line&quot; data-result=&quot;traditional&quot;&gt;当前：两边数据相同，但它们是两份副本&lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;system&quot; aria-labelledby=&quot;uma-title&quot;&gt;
      &lt;h3 id=&quot;uma-title&quot;&gt;典型统一内存 SoC&lt;/h3&gt;
      &lt;p class=&quot;system-note&quot;&gt;如 Apple M 系列 · CPU/GPU共享物理内存&lt;/p&gt;

      &lt;div class=&quot;machine uma-machine&quot; role=&quot;img&quot; aria-label=&quot;统一内存SoC：CPU与GPU位于同一芯片，通过一致性互联访问同一套内存&quot;&gt;
        &lt;div class=&quot;soc-boundary&quot;&gt;
          &lt;span class=&quot;boundary-label&quot;&gt;同一 SoC 封装&lt;/span&gt;
          &lt;div class=&quot;soc-compute&quot;&gt;
            &lt;div class=&quot;node chip cpu-node&quot;&gt;
              &lt;span class=&quot;node-kind&quot;&gt;CPU核心&lt;/span&gt;
              &lt;span class=&quot;cache&quot; data-value=&quot;uma-cpu-cache&quot;&gt;缓存 x=10&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;coherent-fabric&quot;&gt;
              &lt;span&gt;一致性互联&lt;/span&gt;
              &lt;span class=&quot;double-arrow&quot;&gt;↔&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;node chip gpu-node&quot;&gt;
              &lt;span class=&quot;node-kind&quot;&gt;GPU核心&lt;/span&gt;
              &lt;span class=&quot;cache&quot; data-value=&quot;uma-gpu-cache&quot;&gt;缓存 x=10&lt;/span&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;interconnect unified-link&quot; aria-hidden=&quot;true&quot;&gt;
          &lt;span class=&quot;arrow&quot;&gt;↕&lt;/span&gt;
          &lt;strong&gt;共享内存控制器&lt;/strong&gt;
        &lt;/div&gt;

        &lt;div class=&quot;node memory shared-memory&quot;&gt;
          &lt;span class=&quot;node-kind&quot;&gt;统一物理内存 DRAM&lt;/span&gt;
          &lt;span data-value=&quot;uma-memory&quot;&gt;唯一数据 x=10&lt;/span&gt;
          &lt;span&gt;CPU与GPU共同使用&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;result-line&quot; data-result=&quot;uma&quot;&gt;当前：两个缓存对应同一份物理数据&lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;system&quot; aria-labelledby=&quot;gb200-title&quot;&gt;
      &lt;h3 id=&quot;gb200-title&quot;&gt;Grace Blackwell GB200&lt;/h3&gt;
      &lt;p class=&quot;system-note&quot;&gt;内存物理分开 · 地址统一 · 缓存一致&lt;/p&gt;

      &lt;div class=&quot;machine gb-machine&quot; role=&quot;img&quot; aria-label=&quot;GB200超级芯片：Grace CPU与两颗Blackwell GPU通过NVLink-C2C连接，各自连接LPDDR与HBM&quot;&gt;
        &lt;div class=&quot;superchip-boundary&quot;&gt;
          &lt;span class=&quot;boundary-label&quot;&gt;超级芯片模块&lt;/span&gt;
          &lt;div class=&quot;nvlink-band&quot;&gt;← NVLink-C2C 缓存一致性互联 →&lt;/div&gt;
          &lt;div class=&quot;superchip-cores&quot;&gt;
            &lt;div class=&quot;node chip gpu-node compact&quot;&gt;
              &lt;span class=&quot;node-kind&quot;&gt;Blackwell GPU ①&lt;/span&gt;
              &lt;span class=&quot;cache&quot; data-value=&quot;gb-gpu-cache-1&quot;&gt;缓存 x=10&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;node chip cpu-node compact&quot;&gt;
              &lt;span class=&quot;node-kind&quot;&gt;Grace CPU&lt;/span&gt;
              &lt;span class=&quot;cache&quot; data-value=&quot;gb-cpu-cache&quot;&gt;缓存 x=10&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;node chip gpu-node compact&quot;&gt;
              &lt;span class=&quot;node-kind&quot;&gt;Blackwell GPU ②&lt;/span&gt;
              &lt;span class=&quot;cache&quot; data-value=&quot;gb-gpu-cache-2&quot;&gt;缓存 x=10&lt;/span&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;memory-bank-row&quot;&gt;
          &lt;div class=&quot;node memory gpu-memory compact-memory&quot;&gt;
            &lt;span class=&quot;node-kind&quot;&gt;HBM&lt;/span&gt;
            &lt;span&gt;最快 · 较小&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;node memory cpu-memory compact-memory&quot;&gt;
            &lt;span class=&quot;node-kind&quot;&gt;LPDDR5X&lt;/span&gt;
            &lt;span data-value=&quot;gb-lpddr&quot;&gt;x=10&lt;/span&gt;
            &lt;span&gt;较大 · 较慢&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;node memory gpu-memory compact-memory&quot;&gt;
            &lt;span class=&quot;node-kind&quot;&gt;HBM&lt;/span&gt;
            &lt;span&gt;最快 · 较小&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;logical-brace&quot;&gt;
          &lt;span&gt;逻辑视图：一个统一地址空间&lt;/span&gt;
          &lt;span&gt;物理视图：LPDDR与HBM仍在不同位置&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;result-line&quot; data-result=&quot;gb200&quot;&gt;当前：不同物理内存由一致性互联协调&lt;/div&gt;
    &lt;/section&gt;
  &lt;/div&gt;

  &lt;div class=&quot;memory-order&quot; aria-label=&quot;GPU访问不同存储层级的速度关系&quot;&gt;
    &lt;span class=&quot;order-label&quot;&gt;GPU访问速度&lt;/span&gt;

&lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&#x27;cpu-gpu-memory-map&#x27;);
    if (!root) return;

    const detail = root.querySelector(&#x27;.step-detail&#x27;);
    const buttons = Array.from(root.querySelectorAll(&#x27;[data-step]&#x27;));
    const byValue = (name) =&gt; root.querySelector(`[data-value=&quot;${name}&quot;]`);
    const byResult = (name) =&gt; root.querySelector(`[data-result=&quot;${name}&quot;]`);

    const setText = (name, value, stateClass = &#x27;&#x27;) =&gt; {
      const el = byValue(name);
      if (!el) return;
      el.textContent = value;
      el.classList.remove(&#x27;is-invalid&#x27;, &#x27;is-stale&#x27;, &#x27;is-current&#x27;);
      if (stateClass) el.classList.add(stateClass);
    };

    const setResult = (name, value, stateClass = &#x27;&#x27;) =&gt; {
      const el = byResult(name);
      if (!el) return;
      el.textContent = value;
      el.classList.remove(&#x27;is-warning&#x27;, &#x27;is-good&#x27;);
      if (stateClass) el.classList.add(stateClass);
    };

    const render = (step) =&gt; {
      buttons.forEach((button) =&gt; {
        const selected = Number(button.dataset.step) === step;
        button.setAttribute(&#x27;aria-pressed&#x27;, String(selected));
        button.classList.toggle(&#x27;btn-primary&#x27;, selected);
      });

      if (step === 0) {
        detail.textContent = &#x27;CPU和GPU都曾读取 x，因此各自附近的缓存里都有一份 x=10。&#x27;;
        setText(&#x27;trad-cpu-cache&#x27;, &#x27;缓存 x=10&#x27;);
        setText(&#x27;trad-ddr&#x27;, &#x27;x=10&#x27;);
        setText(&#x27;trad-gpu-cache&#x27;, &#x27;缓存 x=10&#x27;);
        setText(&#x27;trad-vram&#x27;, &#x27;副本 x=10&#x27;);
        setText(&#x27;uma-cpu-cache&#x27;, &#x27;缓存 x=10&#x27;);
        setText(&#x27;uma-gpu-cache&#x27;, &#x27;缓存 x=10&#x27;);
        setText(&#x27;uma-memory&#x27;, &#x27;唯一数据 x=10&#x27;);
        setText(&#x27;gb-cpu-cache&#x27;, &#x27;缓存 x=10&#x27;);
        setText(&#x27;gb-gpu-cache-1&#x27;, &#x27;缓存 x=10&#x27;);
        setText(&#x27;gb-gpu-cache-2&#x27;, &#x27;缓存 x=10&#x27;);
        setText(&#x27;gb-lpddr&#x27;, &#x27;x=10&#x27;);
        setResult(&#x27;traditional&#x27;, &#x27;当前：两边数据相同，但它们是两份副本&#x27;);
        setResult(&#x27;uma&#x27;, &#x27;当前：两个缓存对应同一份物理数据&#x27;);
        setResult(&#x27;gb200&#x27;, &#x27;当前：不同物理内存由一致性互联协调&#x27;);
      }

      if (step === 1) {
        detail.textContent = &#x27;CPU把 x 改为20：传统独显那边的副本无人自动通知；一致性系统会使GPU旧缓存失效。&#x27;;
        setText(&#x27;trad-cpu-cache&#x27;, &#x27;缓存 x=20&#x27;, &#x27;is-current&#x27;);
        setText(&#x27;trad-ddr&#x27;, &#x27;x=20&#x27;);
        setText(&#x27;trad-gpu-cache&#x27;, &#x27;缓存仍是 x=10&#x27;, &#x27;is-stale&#x27;);
        setText(&#x27;trad-vram&#x27;, &#x27;副本仍是 x=10&#x27;);
        setText(&#x27;uma-cpu-cache&#x27;, &#x27;缓存 x=20&#x27;, &#x27;is-current&#x27;);
        setText(&#x27;uma-gpu-cache&#x27;, &#x27;旧缓存已失效&#x27;, &#x27;is-invalid&#x27;);
        setText(&#x27;uma-memory&#x27;, &#x27;唯一数据 x=20&#x27;);
        setText(&#x27;gb-cpu-cache&#x27;, &#x27;缓存 x=20&#x27;, &#x27;is-current&#x27;);
        setText(&#x27;gb-gpu-cache-1&#x27;, &#x27;旧缓存已失效&#x27;, &#x27;is-invalid&#x27;);
        setText(&#x27;gb-gpu-cache-2&#x27;, &#x27;旧缓存已失效&#x27;, &#x27;is-invalid&#x27;);
        setText(&#x27;gb-lpddr&#x27;, &#x27;x=20&#x27;);
        setResult(&#x27;traditional&#x27;, &#x27;没有显式复制：GPU一侧仍保留旧副本&#x27;, &#x27;is-warning&#x27;);
        setResult(&#x27;uma&#x27;, &#x27;一致性互联：GPU旧缓存被标记为无效&#x27;, &#x27;is-good&#x27;);
        setResult(&#x27;gb200&#x27;, &#x27;NVLink-C2C：两颗GPU的旧缓存都被标记为无效&#x27;, &#x27;is-good&#x27;);
      }

      if (step === 2) {
        detail.textContent = &#x27;GPU再次读取：传统独显仍可能读到10；统一内存SoC和GB200会重新取得最新值20。&#x27;;
        setText(&#x27;trad-cpu-cache&#x27;, &#x27;缓存 x=20&#x27;, &#x27;is-current&#x27;);
        setText(&#x27;trad-ddr&#x27;, &#x27;x=20&#x27;);
        setText(&#x27;trad-gpu-cache&#x27;, &#x27;读到旧值 x=10&#x27;, &#x27;is-stale&#x27;);
        setText(&#x27;trad-vram&#x27;, &#x27;副本仍是 x=10&#x27;);
        setText(&#x27;uma-cpu-cache&#x27;, &#x27;缓存 x=20&#x27;, &#x27;is-current&#x27;);
        setText(&#x27;uma-gpu-cache&#x27;, &#x27;重新读取 x=20&#x27;, &#x27;is-current&#x27;);
        setText(&#x27;uma-memory&#x27;, &#x27;唯一数据 x=20&#x27;);
        setText(&#x27;gb-cpu-cache&#x27;, &#x27;缓存 x=20&#x27;, &#x27;is-current&#x27;);
        setText(&#x27;gb-gpu-cache-1&#x27;, &#x27;重新读取 x=20&#x27;, &#x27;is-current&#x27;);
        setText(&#x27;gb-gpu-cache-2&#x27;, &#x27;重新读取 x=20&#x27;, &#x27;is-current&#x27;);
        setText(&#x27;gb-lpddr&#x27;, &#x27;x=20&#x27;);
        setResult(&#x27;traditional&#x27;, &#x27;要读到20：需要复制、迁移或显式同步&#x27;, &#x27;is-warning&#x27;);
        setResult(&#x27;uma&#x27;, &#x27;无需保留第二份独立显存副本，读取最新值20&#x27;, &#x27;is-good&#x27;);
        setResult(&#x27;gb200&#x27;, &#x27;物理内存虽分开，但缓存一致并读取最新值20&#x27;, &#x27;is-good&#x27;);
      }
    };

    buttons.forEach((button) =&gt; {
      button.addEventListener(&#x27;click&#x27;, () =&gt; render(Number(button.dataset.step)));
    });

    render(0);
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

}

  border-color: var(--ring);

}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;

.btn:not(.btn-primary, .viz-tile):is(

  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {

.btn:focus-visible {

svg {

  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {

}

&lt;body&gt;

&lt;script&gt;
(() =&gt; {
  const root=document.getElementById(&#x27;gpu-parallel-global-zoom&#x27;);
  const svg=document.getElementById(&#x27;gpu-global-svg&#x27;);
  const status=document.getElementById(&#x27;gpu-global-status&#x27;);
  const buttons=Array.from(root.querySelectorAll(&#x27;[data-global-step]&#x27;));
  const input=Array.from({length:64},(_,i)=&gt;i+1);
  const after32=Array.from({length:32},(_,i)=&gt;input[i]+input[i+32]);

  const views={
    mapping:{index:1,title:&#x27;全局分工：输入在 HBM，Block 被调度到一个 SM&#x27;,detail:&#x27;全局图先定位 HBM、GPU die、L2 和多个 SM；右侧再放大实际执行该 Block 的 SM。&#x27;,active:[&#x27;cpu&#x27;,&#x27;hbmIn&#x27;,&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;warp1&#x27;],path:&#x27;dispatch&#x27;,hbmIn:&#x27;x[0…63]|=1…64&#x27;,hbmOut:&#x27;空&#x27;,l2:&#x27;空&#x27;,l1:&#x27;空&#x27;,reg:&#x27;空&#x27;,shared:&#x27;未初始化&#x27;,alu:&#x27;空闲&#x27;,draw:drawMapping},
    registers:{index:2,title:&#x27;Load：从全局 HBM 进入每个线程自己的寄存器组&#x27;,detail:&#x27;每个线程拥有多个私有寄存器；本步先用其中一个 r 保存自己的输入值，不是所有线程共用一个寄存器。&#x27;,active:[&#x27;hbmIn&#x27;,&#x27;l2&#x27;,&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;warp1&#x27;,&#x27;l1&#x27;,&#x27;reg&#x27;],path:&#x27;load&#x27;,hbmIn:&#x27;原始 x|仍保留&#x27;,hbmOut:&#x27;空&#x27;,l2:&#x27;缓存路径&#x27;,l1:&#x27;缓存路径&#x27;,reg:&#x27;每线程一组|本步用 r&#x27;,shared:&#x27;未初始化&#x27;,alu:&#x27;Load&#x27;,draw:drawRegisters},
    shared:{index:3,title:&#x27;写 Shared：64 个线程把自己的值放进 Block 公共工作台&#x27;,detail:&#x27;本步不访问 HBM；每个线程把自己的寄存器值写入 s[tid]，形成 s[0…63]=1…64。&#x27;,active:[&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;warp1&#x27;,&#x27;reg&#x27;,&#x27;shared&#x27;],path:&#x27;toShared&#x27;,hbmIn:&#x27;原始 x|仍保留&#x27;,hbmOut:&#x27;空&#x27;,l2:&#x27;非本步重点&#x27;,l1:&#x27;非本步重点&#x27;,reg:&#x27;r_tid|=1…64&#x27;,shared:&#x27;s[0…63]|=1…64&#x27;,alu:&#x27;Store&#x27;,draw:drawShared},
    barrier:{index:4,title:&#x27;同步屏障：必须等 64 个线程全部写完 Shared&#x27;,detail:&#x27;两个 Warp 都到达 __syncthreads() 后，才允许任何线程读取配对数据；屏障只等待，不搬运数据。&#x27;,active:[&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;warp1&#x27;,&#x27;shared&#x27;],path:&#x27;none&#x27;,hbmIn:&#x27;原始 x|不变&#x27;,hbmOut:&#x27;空&#x27;,l2:&#x27;本轮不用&#x27;,l1:&#x27;本轮不用&#x27;,reg:&#x27;等待下一步&#x27;,shared:&#x27;64 槽均就绪&#x27;,alu:&#x27;等待&#x27;,draw:drawBarrier},
    &#x27;read-pairs&#x27;:{index:5,title:&#x27;Shared 的核心作用：让 T0 取得原本属于 T32 的数据&#x27;,detail:&#x27;T0 不能读取 T32 的私有寄存器；T32 先把 33 写到 Shared，T0 再把它读入自己的 Rb。一个线程有多个寄存器，Ra 与 Rb 各保存一个数。&#x27;,active:[&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;reg&#x27;,&#x27;shared&#x27;],path:&#x27;fromShared&#x27;,hbmIn:&#x27;原始 x|不变&#x27;,hbmOut:&#x27;空&#x27;,l2:&#x27;不参与&#x27;,l1:&#x27;不参与&#x27;,reg:&#x27;T0.Ra=1|T0.Rb=33&#x27;,shared:&#x27;跨线程交换|s0 与 s32&#x27;,alu:&#x27;尚未加&#x27;,draw:drawReadPairs},
    alu32:{index:6,title:&#x27;真正的加法路径：每线程 Ra、Rb → ALU → Rsum&#x27;,detail:&#x27;Shared 不参与算术；它只提供可共享的数据。每条 Lane 的 ALU 从本线程的两个操作数寄存器取数，把结果写入第三个结果寄存器。&#x27;,active:[&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;reg&#x27;,&#x27;alu&#x27;],path:&#x27;regToAlu&#x27;,hbmIn:&#x27;原始 x|不变&#x27;,hbmOut:&#x27;空&#x27;,l2:&#x27;不参与&#x27;,l1:&#x27;不参与&#x27;,reg:&#x27;Ra,Rb|→ Rsum&#x27;,shared:&#x27;只存数据|不做加法&#x27;,alu:&#x27;32 路 add&#x27;,draw:drawAlu32},
    write32:{index:7,title:&#x27;第一轮写回：每个线程把自己的 Rsum 写回 Shared&#x27;,detail:&#x27;T0.Rsum 写 s[0]，T1.Rsum 写 s[1]，直到 T31.Rsum 写 s[31]；Shared 保存新结果，供下一轮跨线程读取。&#x27;,active:[&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;reg&#x27;,&#x27;shared&#x27;,&#x27;alu&#x27;],path:&#x27;backShared&#x27;,hbmIn:&#x27;原始 x|不变&#x27;,hbmOut:&#x27;空&#x27;,l2:&#x27;不参与&#x27;,l1:&#x27;不参与&#x27;,reg:&#x27;Rsum=34…96&#x27;,shared:&#x27;s[0…31]|=34…96&#x27;,alu:&#x27;完成本轮&#x27;,draw:drawWrite32},
    rounds:{index:8,title:&#x27;后续轮次：每轮仍执行 读 Shared → 寄存器加法 → 写 Shared&#x27;,detail:&#x27;stride 每次减半，活跃 Lane 从 16 减到 1；每一行都是一次并行轮次，行与行之间必须同步。&#x27;,active:[&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;reg&#x27;,&#x27;shared&#x27;,&#x27;alu&#x27;],path:&#x27;computeLoop&#x27;,hbmIn:&#x27;原始 x|不变&#x27;,hbmOut:&#x27;空&#x27;,l2:&#x27;不参与&#x27;,l1:&#x27;不参与&#x27;,reg:&#x27;每轮 a,b,sum&#x27;,shared:&#x27;有效前缀变短&#x27;,alu:&#x27;16→8→4|→2→1&#x27;,draw:drawRounds},
    final:{index:9,title:&#x27;计算完成：最后只有 T0，把 1024 与 1056 加成 2080&#x27;,detail:&#x27;T0.Ra 与 T0.Rb 向 ALU 提供最后两个操作数，结果先进入 T0.Rsum，再写入 Shared s[0]。&#x27;,active:[&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;reg&#x27;,&#x27;shared&#x27;,&#x27;alu&#x27;],path:&#x27;finalAdd&#x27;,hbmIn:&#x27;原始 x|不变&#x27;,hbmOut:&#x27;仍为空&#x27;,l2:&#x27;不参与&#x27;,l1:&#x27;不参与&#x27;,reg:&#x27;T0.Rsum|=2080&#x27;,shared:&#x27;s[0]|=2080&#x27;,alu:&#x27;最后 1 加&#x27;,draw:drawFinal},
    storage:{index:10,title:&#x27;位置总表：全局与放大视图同时保留&#x27;,detail:&#x27;HBM 是长期内存；L2/L1 是硬件缓存；寄存器属于线程；Shared 属于当前 SM 上的 Block。&#x27;,active:[&#x27;hbmIn&#x27;,&#x27;sm&#x27;,&#x27;reg&#x27;,&#x27;shared&#x27;],path:&#x27;none&#x27;,hbmIn:&#x27;输入 1…64&#x27;,hbmOut:&#x27;尚未写回&#x27;,l2:&#x27;可能缓存&#x27;,l1:&#x27;可能缓存&#x27;,reg:&#x27;线程私有&#x27;,shared:&#x27;Block 共享&#x27;,alu:&#x27;执行加法&#x27;,draw:drawStorage},
    timeline:{index:11,title:&#x27;时间线：等待发生在全局内存路径，计算发生在放大的 SM 内&#x27;,detail:&#x27;一个 Warp 等待 HBM Load 时，SM 调度器可以让另一个已就绪 Warp 使用执行单元。&#x27;,active:[&#x27;hbmIn&#x27;,&#x27;l2&#x27;,&#x27;sm&#x27;,&#x27;warp0&#x27;,&#x27;warp1&#x27;,&#x27;l1&#x27;,&#x27;reg&#x27;,&#x27;alu&#x27;],path:&#x27;load&#x27;,hbmIn:&#x27;Load 来源&#x27;,hbmOut:&#x27;空&#x27;,l2:&#x27;等待路径&#x27;,l1:&#x27;SM 内缓存&#x27;,reg:&#x27;数据到达|Warp 就绪&#x27;,shared:&#x27;随后写入&#x27;,alu:&#x27;运行其他|Warp&#x27;,draw:drawTimeline},
    overview:{index:12,title:&#x27;写回：结果离开放大的 SM，经 L2 返回同一 HBM 内存池&#x27;,detail:&#x27;HBM 是一个内存池：输入区域 x 保持 1…64，输出区域 out[0] 最终保存 2080。&#x27;,active:[&#x27;hbmIn&#x27;,&#x27;hbmOut&#x27;,&#x27;l2&#x27;,&#x27;sm&#x27;,&#x27;reg&#x27;,&#x27;shared&#x27;],path:&#x27;store&#x27;,hbmIn:&#x27;x[0…63]|仍是1…64&#x27;,hbmOut:&#x27;out[0]|=2080&#x27;,l2:&#x27;Store 路径&#x27;,l1:&#x27;非关键&#x27;,reg:&#x27;T0.r|=2080&#x27;,shared:&#x27;s[0]|=2080&#x27;,alu:&#x27;完成&#x27;,draw:drawOverview}
  };
  const totalViews=Object.keys(views).length;

  function esc(v){return String(v).replace(/[&amp;&lt;&gt;&quot;&#x27;]/g,c=&gt;({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#039;&#x27;}[c]));}

  function detailFrame(){return `&lt;rect x=&quot;36&quot; y=&quot;450&quot; width=&quot;1128&quot; height=&quot;414&quot; rx=&quot;20&quot; class=&quot;frame&quot;/&gt;`;}
  function cells(values,start,x,y,prefix,cls,cols=32,w=31,h=40){return values.map((v,i)=&gt;{const px=x+(i%cols)*w,py=y+Math.floor(i/cols)*(h+6);return `&lt;rect x=&quot;${px}&quot; y=&quot;${py}&quot; width=&quot;${w-3}&quot; height=&quot;${h}&quot; rx=&quot;5&quot; class=&quot;${cls}&quot;/&gt;&lt;text x=&quot;${px+(w-3)/2}&quot; y=&quot;${py+13}&quot; text-anchor=&quot;middle&quot; class=&quot;small&quot;&gt;${prefix}${start+i}&lt;/text&gt;&lt;text x=&quot;${px+(w-3)/2}&quot; y=&quot;${py+32}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;${v}&lt;/text&gt;`}).join(&#x27;&#x27;);}
  function laneStrip(y,count=32,start=0,cls=&#x27;s3&#x27;){let out=&#x27;&#x27;;for(let i=0;i&lt;32;i+=1){const x=64+i*34,active=i&lt;count;out+=`&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;29&quot; height=&quot;30&quot; rx=&quot;5&quot; class=&quot;${active?cls:&#x27;inactive&#x27;}&quot;/&gt;&lt;text x=&quot;${x+14.5}&quot; y=&quot;${y+20}&quot; text-anchor=&quot;middle&quot; class=&quot;small&quot;&gt;T${start+i}&lt;/text&gt;`;}return out;}
  function sampleRow(y,thread,aIndex,aValue,bIndex,bValue,sum){return `&lt;rect x=&quot;62&quot; y=&quot;${y}&quot; width=&quot;92&quot; height=&quot;48&quot; rx=&quot;9&quot; class=&quot;s3&quot;/&gt;&lt;text x=&quot;108&quot; y=&quot;${y+30}&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;${thread}&lt;/text&gt;&lt;rect x=&quot;184&quot; y=&quot;${y}&quot; width=&quot;176&quot; height=&quot;48&quot; rx=&quot;9&quot; class=&quot;s5&quot;/&gt;&lt;text x=&quot;272&quot; y=&quot;${y+30}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;s[${aIndex}] = ${aValue}&lt;/text&gt;&lt;path d=&quot;M360 ${y+24}L398 ${y+24}&quot; class=&quot;path4&quot;/&gt;&lt;rect x=&quot;408&quot; y=&quot;${y}&quot; width=&quot;140&quot; height=&quot;48&quot; rx=&quot;9&quot; class=&quot;s4&quot;/&gt;&lt;text x=&quot;478&quot; y=&quot;${y+30}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;a = ${aValue}&lt;/text&gt;&lt;rect x=&quot;578&quot; y=&quot;${y}&quot; width=&quot;176&quot; height=&quot;48&quot; rx=&quot;9&quot; class=&quot;s5&quot;/&gt;&lt;text x=&quot;666&quot; y=&quot;${y+30}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;s[${bIndex}] = ${bValue}&lt;/text&gt;&lt;path d=&quot;M754 ${y+24}L792 ${y+24}&quot; class=&quot;path4&quot;/&gt;&lt;rect x=&quot;802&quot; y=&quot;${y}&quot; width=&quot;140&quot; height=&quot;48&quot; rx=&quot;9&quot; class=&quot;s4&quot;/&gt;&lt;text x=&quot;872&quot; y=&quot;${y+30}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;b = ${bValue}&lt;/text&gt;&lt;rect x=&quot;972&quot; y=&quot;${y}&quot; width=&quot;166&quot; height=&quot;48&quot; rx=&quot;9&quot; class=&quot;neutral&quot;/&gt;&lt;text x=&quot;1055&quot; y=&quot;${y+30}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;等待：${sum}&lt;/text&gt;`;}

  function drawMapping(){return `${detailFrame()}&lt;text x=&quot;60&quot; y=&quot;480&quot; class=&quot;label&quot;&gt;全局任务：一个包含 64 个线程的 Block 被放到高亮的 SM 5&lt;/text&gt;${cells(input.slice(0,32),0,92,510,&#x27;x&#x27;,&#x27;s1&#x27;)}${cells(input.slice(32),32,92,558,&#x27;x&#x27;,&#x27;s1&#x27;)}&lt;rect x=&quot;74&quot; y=&quot;632&quot; width=&quot;500&quot; height=&quot;150&quot; rx=&quot;15&quot; class=&quot;s3&quot;/&gt;&lt;text x=&quot;324&quot; y=&quot;663&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;Warp 0 · T0…T31&lt;/text&gt;&lt;text x=&quot;104&quot; y=&quot;704&quot; class=&quot;body&quot;&gt;T0 负责 x[0]=1；T1 负责 x[1]=2&lt;/text&gt;&lt;text x=&quot;104&quot; y=&quot;738&quot; class=&quot;body&quot;&gt;… T31 负责 x[31]=32&lt;/text&gt;&lt;rect x=&quot;626&quot; y=&quot;632&quot; width=&quot;500&quot; height=&quot;150&quot; rx=&quot;15&quot; class=&quot;s3&quot;/&gt;&lt;text x=&quot;876&quot; y=&quot;663&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;Warp 1 · T32…T63&lt;/text&gt;&lt;text x=&quot;656&quot; y=&quot;704&quot; class=&quot;body&quot;&gt;T32 负责 x[32]=33；T33 负责 x[33]=34&lt;/text&gt;&lt;text x=&quot;656&quot; y=&quot;738&quot; class=&quot;body&quot;&gt;… T63 负责 x[63]=64&lt;/text&gt;${pill(370,812,460,&#x27;全局定位：HBM 输入区 → GPU die → 选中的 SM 5&#x27;)}${footer(&#x27;本步只分工；数据仍只存在 HBM，放大的 SM 内寄存器与 Shared 还是空的。&#x27;)}`;}
  function drawRegisters(){return `${detailFrame()}&lt;text x=&quot;60&quot; y=&quot;480&quot; class=&quot;label&quot;&gt;放大 SM 5：每个线程都有一组私有寄存器；本步只使用其中一个 r&lt;/text&gt;&lt;text x=&quot;60&quot; y=&quot;516&quot; class=&quot;body&quot;&gt;Warp 0：T0.r…T31.r（每格只画当前使用的 r，不代表线程只有一个寄存器）&lt;/text&gt;${cells(input.slice(0,32),0,92,536,&#x27;T&#x27;,&#x27;s3&#x27;)}&lt;text x=&quot;60&quot; y=&quot;612&quot; class=&quot;body&quot;&gt;Warp 1：T32.r…T63.r（这些 r 仍分别属于 32 个不同线程）&lt;/text&gt;${cells(input.slice(32),32,92,632,&#x27;T&#x27;,&#x27;s3&#x27;)}&lt;rect x=&quot;74&quot; y=&quot;718&quot; width=&quot;1052&quot; height=&quot;92&quot; rx=&quot;14&quot; class=&quot;neutral&quot;/&gt;&lt;text x=&quot;600&quot; y=&quot;751&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;“线程私有”是什么意思？&lt;/text&gt;&lt;text x=&quot;600&quot; y=&quot;784&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;T0 只能直接使用自己的寄存器组；它不能直接读取 T1.r 或 T32.r。&lt;/text&gt;${footer(&#x27;每个线程通常会同时使用多个寄存器；这里的 r 只是保存初始输入的一个寄存器。&#x27;)}`;}

  function drawTimeline(){const x0=246,u=90;let grid=&#x27;&#x27;;for(let i=0;i&lt;=9;i+=1){const x=x0+i*u;grid+=`&lt;line x1=&quot;${x}&quot; y1=&quot;500&quot; x2=&quot;${x}&quot; y2=&quot;810&quot; class=&quot;line&quot;/&gt;&lt;text x=&quot;${x}&quot; y=&quot;484&quot; text-anchor=&quot;middle&quot; class=&quot;small&quot;&gt;t${i}&lt;/text&gt;`;}function bar(y,a,b,t,c){const x=x0+a*u+4,w=(b-a)*u-8;return `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;39&quot; rx=&quot;8&quot; class=&quot;${c}&quot;/&gt;&lt;text x=&quot;${x+w/2}&quot; y=&quot;${y+25}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;${t}&lt;/text&gt;`;}return `${detailFrame()}${grid}&lt;text x=&quot;56&quot; y=&quot;538&quot; class=&quot;label&quot;&gt;Warp 0&lt;/text&gt;${bar(510,0,1,&#x27;Load&#x27;,&#x27;s1&#x27;)}${bar(510,1,4,&#x27;等待 HBM&#x27;,&#x27;inactive&#x27;)}${bar(510,4,6,&#x27;寄存器就绪&#x27;,&#x27;s4&#x27;)}${bar(510,6,8,&#x27;寄存器 → ALU 加法&#x27;,&#x27;s6&#x27;)}&lt;text x=&quot;56&quot; y=&quot;608&quot; class=&quot;label&quot;&gt;Warp 1&lt;/text&gt;${bar(580,1,2,&#x27;Load&#x27;,&#x27;s1&#x27;)}${bar(580,2,5,&#x27;等待 HBM&#x27;,&#x27;inactive&#x27;)}${bar(580,5,7,&#x27;寄存器就绪&#x27;,&#x27;s4&#x27;)}&lt;text x=&quot;56&quot; y=&quot;678&quot; class=&quot;label&quot;&gt;其他 Warp&lt;/text&gt;${bar(650,2,4,&#x27;占用 SM 算术单元&#x27;,&#x27;s6&#x27;)}${bar(650,8,9,&#x27;继续计算&#x27;,&#x27;s6&#x27;)}&lt;text x=&quot;56&quot; y=&quot;748&quot; class=&quot;label&quot;&gt;数据位置&lt;/text&gt;${bar(720,0,2,&#x27;全局 HBM/L2&#x27;,&#x27;s1&#x27;)}${bar(720,2,5,&#x27;内存路径等待&#x27;,&#x27;inactive&#x27;)}${bar(720,5,7,&#x27;SM 寄存器&#x27;,&#x27;s4&#x27;)}${bar(720,7,9,&#x27;SM Shared&#x27;,&#x27;s5&#x27;)}&lt;rect x=&quot;246&quot; y=&quot;800&quot; width=&quot;810&quot; height=&quot;42&quot; rx=&quot;10&quot; class=&quot;neutral&quot;/&gt;&lt;text x=&quot;651&quot; y=&quot;827&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;全局内存等待与放大 SM 内其他 Warp 的计算发生   function drawOverview(){return `${detailFrame()}&lt;rect x=&quot;62&quot; y=&quot;488&quot; width=&quot;300&quot; height=&quot;140&quot; rx=&quot;14&quot; class=&quot;s1&quot;/&gt;&lt;text x=&quot;212&quot; y=&quot;521&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;同一个 HBM 内存池&lt;/text&gt;&lt;text x=&quot;212&quot; y=&quot;558&quot; text-anchor=&quot;middle&quot; class=&quot;value&quot;&gt;x[0…63] = 1…64&lt;/text&gt;&lt;text x=&quot;212&quot; y=&quot;590&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;输入区域保持不变&lt;/text&gt;&lt;rect x=&quot;450&quot; y=&quot;488&quot; width=&quot;300&quot; height=&quot;140&quot; rx=&quot;14&quot; class=&quot;s5&quot;/&gt;&lt;text x=&quot;600&quot; y=&quot;521&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;放大的 SM 5&lt;/text&gt;&lt;text x=&quot;600&quot; y=&quot;558&quot; text-anchor=&quot;middle&quot; class=&quot;value&quot;&gt;Shared s[0] = 2080&lt;/text&gt;&lt;text x=&quot;600&quot; y=&quot;590&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;64 个值经过 63 次片上加法&lt;/text&gt;&lt;rect x=&quot;838&quot; y=&quot;488&quot; width=&quot;300&quot; height=&quot;140&quot; rx=&quot;14&quot; class=&quot;s2&quot;/&gt;&lt;text x=&quot;988&quot; y=&quot;521&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;同一个 HBM 内存池&lt;/text&gt;&lt;text x=&quot;988&quot; y=&quot;558&quot; text-anchor=&quot;middle&quot; class=&quot;value&quot;&gt;out[0] = 2080&lt;/text&gt;&lt;text x=&quot;988&quot; y=&quot;590&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;T0 经 L2 路径写回输出区域&lt;/text&gt;&lt;path d=&quot;M362 558L438 558&quot; class=&quot;path1&quot;/&gt;&lt;path d=&quot;M750 558L826 558&quot; class=&quot;path2&quot;/&gt;&lt;rect x=&quot;62&quot; y=&quot;672&quot; width=&quot;1076&quot; height=&quot;124&quot; rx=&quot;14&quot; class=&quot;neutral&quot;/&gt;&lt;text x=&quot;600&quot; y=&quot;704&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;全局 → 放大 SM → 回到全局&lt;/text&gt;&lt;text x=&quot;600&quot; y=&quot;738&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;HBM 输入 → L2 → 每线程初始寄存器 r → Shared&lt;/text&gt;&lt;text x=&quot;600&quot; y=&quot;765&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;每轮：Shared 转交 → 每线程 Ra/Rb → ALU → 每线程 Rsum → Shared&lt;/text&gt;&lt;text x=&quot;600&quot; y=&quot;792&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;最终：Shared s[0] → T0 寄存器 → L2 → HBM 输出 out[0]&lt;/text&gt;${pill(398,822,404,&#x27;1 + 2 + … + 64 = 2080&#x27;)}${footer(&#x27;Shared 负责跨线程交换，ALU 负责加法，寄存器组负责提供操作数并接住结果。&#x27;)}`;}

  function render(id){const selected=views[id]?id:&#x27;mapping&#x27;,v=views[selected];svg.innerHTML=defs(v)+header(v)+globalZoom(v)+v.draw(v);status.textContent=v.detail;buttons.forEach(b=&gt;{const on=b.dataset.globalStep===selected;b.setAttribute(&#x27;aria-pressed&#x27;,String(on));b.classList.toggle(&#x27;btn-primary&#x27;,on)});if(window.location.hash!==`#${selected}`)history.replaceState(null,&#x27;&#x27;,`#${selected}`);}

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

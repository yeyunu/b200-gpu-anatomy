  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);

}

.form-switch .form-check-input:checked {

}

}

.form-range {

  display: block;

  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);

      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )

.form-range::-webkit-slider-runnable-track {

  background: transparent;
}

  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);

}

.btn:focus-visible {

}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;

&lt;body&gt;
&lt;div id=&quot;gpu-parallel-memory-locations&quot;&gt;
  &lt;div class=&quot;viz-controls&quot; aria-label=&quot;并行求和步骤&quot;&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-location-step=&quot;mapping&quot; aria-pressed=&quot;true&quot;&gt;1 HBM 中的输入&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-location-step=&quot;registers&quot; aria-pressed=&quot;false&quot;&gt;2 读到寄存器&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-location-step=&quot;shared&quot; aria-pressed=&quot;false&quot;&gt;3 写入 Shared&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-location-step=&quot;round32&quot; aria-pressed=&quot;false&quot;&gt;4 SM 内并行加&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-location-step=&quot;rounds&quot; aria-pressed=&quot;false&quot;&gt;5 SM 内继续归约&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-location-step=&quot;storage&quot; aria-pressed=&quot;false&quot;&gt;6 各阶段位置表&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-location-step=&quot;timeline&quot; aria-pressed=&quot;false&quot;&gt;7 Warp 时间线&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-location-step=&quot;overview&quot; aria-pressed=&quot;false&quot;&gt;8 写回 HBM&lt;/button&gt;
  &lt;/div&gt;
  &lt;div id=&quot;gpu-location-stage&quot;&gt;
    &lt;svg id=&quot;gpu-location-svg&quot; viewBox=&quot;0 0 1200 960&quot; role=&quot;img&quot; aria-labelledby=&quot;gpu-location-title gpu-location-desc&quot;&gt;&lt;/svg&gt;
    &lt;div id=&quot;gpu-location-status&quot; class=&quot;text-small&quot; aria-live=&quot;polite&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;

&lt;style&gt;
  #gpu-parallel-memory-locations {

  }

  #gpu-location-svg .label {

  #gpu-location-svg .s1 {
    fill: color-mix(in srgb, var(--viz-series-1) 17%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-1) 74%, var(--border));

  }
  #gpu-location-svg .s2 {
    fill: color-mix(in srgb, var(--viz-series-2) 17%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-2) 74%, var(--border));
    stroke-width: 1.6;
  }
  #gpu-location-svg .s3 {
    fill: color-mix(in srgb, var(--viz-series-3) 17%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-3) 74%, var(--border));
    stroke-width: 1.6;
  }
  #gpu-location-svg .s4 {
    fill: color-mix(in srgb, var(--viz-series-4) 17%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-4) 74%, var(--border));
    stroke-width: 1.6;
  }
  #gpu-location-svg .s5 {
    fill: color-mix(in srgb, var(--viz-series-5) 17%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-5) 74%, var(--border));

  #gpu-location-svg .s6 {

  #gpu-location-svg .line {

  }
  #gpu-location-svg .path2 {

    stroke: var(--viz-series-2);
    stroke-width: 3;
    marker-end: url(#location-arrow-2);
  }
  #gpu-location-svg .path3 {
    fill: none;
    stroke: var(--viz-series-3);
    stroke-width: 3;
    marker-end: url(#location-arrow-3);
  }
  #gpu-location-svg .path4 {
    fill: none;
    stroke: var(--viz-series-4);
    stroke-width: 3;
    marker-end: url(#location-arrow-4);
  }
  #gpu-location-svg .dash {

&lt;/style&gt;

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;gpu-parallel-memory-locations&#x27;);
  const svg = document.getElementById(&#x27;gpu-location-svg&#x27;);
  const status = document.getElementById(&#x27;gpu-location-status&#x27;);
  const buttons = Array.from(root.querySelectorAll(&#x27;[data-location-step]&#x27;));
  const input = Array.from({length: 64}, (_, i) =&gt; i + 1);
  const after32 = Array.from({length: 32}, (_, i) =&gt; input[i] + input[i + 32]);
  const after16 = Array.from({length: 16}, (_, i) =&gt; after32[i] + after32[i + 16]);
  const after8 = Array.from({length: 8}, (_, i) =&gt; after16[i] + after16[i + 8]);
  const after4 = Array.from({length: 4}, (_, i) =&gt; after8[i] + after8[i + 4]);
  const after2 = Array.from({length: 2}, (_, i) =&gt; after4[i] + after4[i + 2]);

  const views = {
    mapping: {
      index: 1,
      title: &#x27;起点：输入只在 HBM，线程还没有拿到数据&#x27;,
      detail: &#x27;HBM 位于 GPU die 外；此时 x[0…63]=1…64，SM 内的寄存器和 Shared Memory 还是空的。&#x27;,
      state: {active:[&#x27;hbmIn&#x27;], hbmIn:&#x27;x[0…63]|= 1…64&#x27;, l2:&#x27;可能缓存副本&#x27;, l1:&#x27;可能缓存副本&#x27;, reg:&#x27;空&#x27;, shared:&#x27;未初始化&#x27;, alu:&#x27;空闲&#x27;, hbmOut:&#x27;空&#x27;, paths:[]},
      draw: drawMapping
    },
    registers: {
      index: 2,
      title: &#x27;Load：数据穿过缓存层级，最终落进每个线程的寄存器&#x27;,
      detail: &#x27;HBM、L2、L1 是访问路径；程序真正得到的是 SM 内每线程私有的寄存器值。&#x27;,
      state: {active:[&#x27;hbmIn&#x27;,&#x27;l2&#x27;,&#x27;l1&#x27;,&#x27;reg&#x27;], hbmIn:&#x27;原始 x|仍然保留&#x27;, l2:&#x27;可能暂存|缓存行&#x27;, l1:&#x27;可能暂存|缓存行&#x27;, reg:&#x27;T0.r=1|… T63.r=64&#x27;, shared:&#x27;未初始化&#x27;, alu:&#x27;Load/Store&#x27;, hbmOut:&#x27;空&#x27;, paths:[&#x27;load&#x27;]},
      draw: drawRegisters
    },
    shared: {
      index: 3,
      title: &#x27;协作准备：线程把寄存器值显式写进 SM 内的 Shared Memory&#x27;,
      detail: &#x27;Shared Memory 与 L1 都在 SM 内，但 Shared 由程序明确寻址；写完后 Block 内线程同步。&#x27;,
      state: {active:[&#x27;reg&#x27;,&#x27;shared&#x27;], hbmIn:&#x27;原始 x|仍然保留&#x27;, l2:&#x27;可能有副本&#x27;, l1:&#x27;缓存路径&#x27;, reg:&#x27;r_tid|= 1…64&#x27;, shared:&#x27;s[0…63]|= 1…64&#x27;, alu:&#x27;Store Shared&#x27;, hbmOut:&#x27;空&#x27;, paths:[&#x27;toShared&#x27;]},
      draw: drawShared
    },
    round32: {
      index: 4,
      title: &#x27;第一轮加法完全发生在 SM 内：Shared → 加法单元 → Shared&#x27;,
      detail: &#x27;Warp 0 的 32 条 Lane 同时读两个 Shared 槽位，执行普通加法，再把 32 个结果写回 Shared。&#x27;,
      state: {active:[&#x27;shared&#x27;,&#x27;alu&#x27;], hbmIn:&#x27;原始 x|没有改变&#x27;, l2:&#x27;本轮不用&#x27;, l1:&#x27;本轮不用&#x27;, reg:&#x27;临时操作数&#x27;, shared:&#x27;s[0…31]|= 34,36…96&#x27;, alu:&#x27;32 条 Lane|同时加法&#x27;, hbmOut:&#x27;空&#x27;, paths:[&#x27;compute&#x27;]},
      draw: drawRound32
    },
    rounds: {
      index: 5,
      title: &#x27;后续归约仍在 SM 内：只更新 Shared Memory 的有效前缀&#x27;,
      detail: &#x27;每轮从 Shared 读取中间值、在 SM 算术单元相加、再写回 Shared；HBM 不参与中间轮次。&#x27;,
      state: {active:[&#x27;shared&#x27;,&#x27;alu&#x27;], hbmIn:&#x27;原始 x|没有改变&#x27;, l2:&#x27;本轮不用&#x27;, l1:&#x27;本轮不用&#x27;, reg:&#x27;临时操作数&#x27;, shared:&#x27;s[0]|最终变成 2080&#x27;, alu:&#x27;16→8→4|→2→1 路&#x27;, hbmOut:&#x27;空&#x27;, paths:[&#x27;compute&#x27;]},
      draw: drawRounds
    },
    storage: {
      index: 6,
      title: &#x27;位置总表：区分长期数据、线程私有值和 Block 中间值&#x27;,
      detail: &#x27;HBM 保存长期输入输出；寄存器归线程所有；Shared 归 Block 所有；L1/L2 只是硬件管理的缓存副本。&#x27;,
      state: {active:[&#x27;hbmIn&#x27;,&#x27;reg&#x27;,&#x27;shared&#x27;], hbmIn:&#x27;输入 1…64&#x27;, l2:&#x27;硬件缓存|非确定位置&#x27;, l1:&#x27;硬件缓存|非确定位置&#x27;, reg:&#x27;每线程私有&#x27;, shared:&#x27;Block 共享|中间结果&#x27;, alu:&#x27;执行加法&#x27;, hbmOut:&#x27;尚未写回&#x27;, paths:[]},
      draw: drawStorage
    },
    timeline: {
      index: 7,
      title: &#x27;Latency hiding：等待发生在内存路径，计算发生在 SM 执行单元&#x27;,
      detail: &#x27;某个 Warp 等待 HBM→缓存→寄存器的 Load 时，SM 调度器可以让另一个已就绪 Warp 使用算术单元。&#x27;,
      state: {active:[&#x27;hbmIn&#x27;,&#x27;l2&#x27;,&#x27;l1&#x27;,&#x27;reg&#x27;,&#x27;alu&#x27;], hbmIn:&#x27;Load 来源&#x27;, l2:&#x27;缓存路径&#x27;, l1:&#x27;SM 本地缓存&#x27;, reg:&#x27;数据到达后|Warp 就绪&#x27;, shared:&#x27;随后写入&#x27;, alu:&#x27;运行其他|已就绪 Warp&#x27;, hbmOut:&#x27;空&#x27;, paths:[&#x27;load&#x27;]},
      draw: drawTimeline
    },
    overview: {
      index: 8,
      title: &#x27;终点：T0 从 Shared 取得 2080，经 L2 路径写入 HBM 输出&#x27;,
      detail: &#x27;输入 HBM 仍保存 1…64；最终结果 out[0]=2080 位于 HBM；中间结果曾经位于 SM 的 Shared。&#x27;,
      state: {active:[&#x27;hbmIn&#x27;,&#x27;shared&#x27;,&#x27;reg&#x27;,&#x27;l2&#x27;,&#x27;hbmOut&#x27;], hbmIn:&#x27;x[0…63]|仍是 1…64&#x27;, l2:&#x27;Store 路径&#x27;, l1:&#x27;本步非关键&#x27;, reg:&#x27;T0.r|= 2080&#x27;, shared:&#x27;s[0]|= 2080&#x27;, alu:&#x27;完成&#x27;, hbmOut:&#x27;out[0]|= 2080&#x27;, paths:[&#x27;store&#x27;]},
      draw: drawOverview
    }
  };

  function esc(value) {
    return String(value).replace(/[&amp;&lt;&gt;&quot;&#x27;]/g, ch =&gt; ({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#039;&#x27;}[ch]));
  }

  function defs(view) {
    return `&lt;title id=&quot;gpu-location-title&quot;&gt;${esc(view.title)}&lt;/title&gt;&lt;desc id=&quot;gpu-location-desc&quot;&gt;${esc(view.detail)}&lt;/desc&gt;&lt;defs&gt;
      &lt;marker id=&quot;location-arrow-1&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto&quot;&gt;&lt;path d=&quot;M0 0 L10 5 L0 10 z&quot; fill=&quot;var(--viz-series-1)&quot;/&gt;&lt;/marker&gt;
      &lt;marker id=&quot;location-arrow-2&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto&quot;&gt;&lt;path d=&quot;M0 0 L10 5 L0 10 z&quot; fill=&quot;var(--viz-series-2)&quot;/&gt;&lt;/marker&gt;
      &lt;marker id=&quot;location-arrow-3&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto&quot;&gt;&lt;path d=&quot;M0 0 L10 5 L0 10 z&quot; fill=&quot;var(--viz-series-3)&quot;/&gt;&lt;/marker&gt;
      &lt;marker id=&quot;location-arrow-4&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto&quot;&gt;&lt;path d=&quot;M0 0 L10 5 L0 10 z&quot; fill=&quot;var(--viz-series-4)&quot;/&gt;&lt;/marker&gt;
    &lt;/defs&gt;`;
  }

  function header(view) {
    return `&lt;text x=&quot;48&quot; y=&quot;38&quot; class=&quot;kicker&quot;&gt;固定位置地图 · ${view.index} / 8&lt;/text&gt;&lt;text x=&quot;48&quot; y=&quot;75&quot; class=&quot;title&quot;&gt;${esc(view.title)}&lt;/text&gt;`;
  }

  function multiline(x, y, text, cls = &#x27;body&#x27;, anchor = &#x27;middle&#x27;, gap = 22) {
    return String(text).split(&#x27;|&#x27;).map((line, i) =&gt; `&lt;text x=&quot;${x}&quot; y=&quot;${y + i * gap}&quot; text-anchor=&quot;${anchor}&quot; class=&quot;${cls}&quot;&gt;${esc(line)}&lt;/text&gt;`).join(&#x27;&#x27;);
  }

  function node(x, y, w, h, title, value, id, state, defaultCls) {
    const active = state.active.includes(id);
    const cls = active ? defaultCls : &#x27;inactive&#x27;;
    return `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;${h}&quot; rx=&quot;12&quot; class=&quot;${cls}&quot;/&gt;&lt;text x=&quot;${x + w / 2}&quot; y=&quot;${y + 25}&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;${esc(title)}&lt;/text&gt;${multiline(x + w / 2, y + 52, value, active ? &#x27;body&#x27; : &#x27;small&#x27;)}`;
  }

  function locationMap(view) {
    const s = view.state;
    let paths = &#x27;&#x27;;
    if (s.paths.includes(&#x27;load&#x27;)) {
      paths += `&lt;path d=&quot;M 218 216 L 286 216&quot; class=&quot;path1&quot;/&gt;&lt;path d=&quot;M 600 198 C 600 216 410 216 410 258&quot; class=&quot;path2&quot;/&gt;&lt;path d=&quot;M 458 304 L 486 304&quot; class=&quot;path3&quot;/&gt;`;
    }
    if (s.paths.includes(&#x27;toShared&#x27;)) {
      paths += `&lt;path d=&quot;M 596 304 L 624 304&quot; class=&quot;path4&quot;/&gt;`;
    }
    if (s.paths.includes(&#x27;compute&#x27;)) {
      paths += `&lt;path d=&quot;M 754 292 C 762 270 770 270 778 292&quot; class=&quot;path3&quot;/&gt;&lt;path d=&quot;M 778 330 C 770 354 762 354 754 330&quot; class=&quot;path3&quot;/&gt;`;
    }
    if (s.paths.includes(&#x27;store&#x27;)) {
      paths += `&lt;path d=&quot;M 690 258 C 690 226 650 218 650 198&quot; class=&quot;path4&quot;/&gt;&lt;path d=&quot;M 914 216 L 982 216&quot; class=&quot;path2&quot;/&gt;`;
    }
    return `&lt;rect x=&quot;246&quot; y=&quot;104&quot; width=&quot;710&quot; height=&quot;286&quot; rx=&quot;22&quot; class=&quot;frame&quot;/&gt;&lt;text x=&quot;266&quot; y=&quot;132&quot; class=&quot;label&quot;&gt;GPU die 内部&lt;/text&gt;
      ${node(48, 148, 170, 136, &#x27;HBM 输入&#x27;, s.hbmIn, &#x27;hbmIn&#x27;, s, &#x27;s1&#x27;)}
      &lt;text x=&quot;133&quot; y=&quot;310&quot; text-anchor=&quot;middle&quot; class=&quot;small&quot;&gt;GPU die 外 · 片外显存&lt;/text&gt;

&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;

    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);

      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)

    );

              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,

      .then(({ x, y }) =&gt; {

  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;

    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger

      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0

      openTooltip(trigger);
      return;

  document.addEventListener(&quot;pointerout&quot;, handleLeave);

  document.addEventListener(&quot;focusout&quot;, handleLeave);

  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

    &lt;g data-gpu-panel=&quot;simt&quot; style=&quot;display:none&quot;&gt;

  &lt;div class=&quot;status-line text-small&quot; aria-live=&quot;polite&quot;&gt;先记住主层级：GPU 包含许多 SM；SM 把线程按 32 个组成 Warp 来调度。&lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;gpu-sm-warp-memory-explainer&#x27;);
      if (!root) return;
      const svgNS = &#x27;http://www.w3.org/2000/svg&#x27;;

      const circle = (parent, cx, cy, className, radius = 5) =&gt; {
        const node = document.createElementNS(svgNS, &#x27;circle&#x27;);
        node.setAttribute(&#x27;cx&#x27;, cx);
        node.setAttribute(&#x27;cy&#x27;, cy);
        node.setAttribute(&#x27;r&#x27;, radius);
        node.setAttribute(&#x27;class&#x27;, className);
        parent.appendChild(node);
      };

      const rect = (parent, x, y, width, height, className, radius = 4) =&gt; {
        const node = document.createElementNS(svgNS, &#x27;rect&#x27;);
        node.setAttribute(&#x27;x&#x27;, x);
        node.setAttribute(&#x27;y&#x27;, y);
        node.setAttribute(&#x27;width&#x27;, width);
        node.setAttribute(&#x27;height&#x27;, height);
        node.setAttribute(&#x27;rx&#x27;, radius);
        node.setAttribute(&#x27;class&#x27;, className);
        parent.appendChild(node);
      };

      const smGrid = root.querySelector(&#x27;#hierarchy-sm-grid&#x27;);
      if (smGrid &amp;&amp; !smGrid.childNodes.length) {
        for (let index = 0; index &lt; 12; index += 1) {
          rect(smGrid, 65 + (index % 3) * 41, 151 + Math.floor(index / 3) * 37, 31, 27, index === 4 ? &#x27;pink&#x27; : &#x27;green&#x27;, 4);
        }
      }

      const threadGrid = root.querySelector(&#x27;#hierarchy-thread-grid&#x27;);
      if (threadGrid &amp;&amp; !threadGrid.childNodes.length) {
        for (let index = 0; index &lt; 32; index += 1) {
          circle(threadGrid, 500 + (index % 8) * 21, 164 + Math.floor(index / 8) * 20, &#x27;thread&#x27;, 5);
        }
      }

      const simtGrid = root.querySelector(&#x27;#simt-thread-grid&#x27;);
      if (simtGrid &amp;&amp; !simtGrid.childNodes.length) {
        for (let index = 0; index &lt; 32; index += 1) {
          circle(simtGrid, 82 + index * 18, 159, &#x27;thread&#x27;, 5);
        }
      }

      const evenGrid = root.querySelector(&#x27;#divergence-even-grid&#x27;);
      const oddGrid = root.querySelector(&#x27;#divergence-odd-grid&#x27;);
      if (evenGrid &amp;&amp; oddGrid &amp;&amp; !evenGrid.childNodes.length &amp;&amp; !oddGrid.childNodes.length) {
        for (let index = 0; index &lt; 32; index += 1) {
          circle(evenGrid, 72 + index * 8.3, 337, index % 2 === 0 ? &#x27;thread&#x27; : &#x27;thread-muted&#x27;, 3.7);
          circle(oddGrid, 392 + index * 8.3, 337, index % 2 === 1 ? &#x27;thread&#x27; : &#x27;thread-muted&#x27;, 3.7);
        }
      }

      const descriptions = {
        hierarchy: &#x27;先记住主层级：GPU 包含许多 SM；SM 把线程按 32 个组成 Warp 来调度。&#x27;,
        sm: &#x27;SM 是一座并行计算工厂：调度 Warp，调用 CUDA/Tensor Core，并使用寄存器、Shared Memory 和 L1。&#x27;,
        simt: &#x27;SIMT 表示一个 Warp 同步执行同一指令；线程分支不同会造成 Warp divergence。&#x27;,
        latency: &#x27;Warp 等待 HBM 时，调度器执行其他已就绪 Warp；等待仍存在，只是被有用计算覆盖。&#x27;,
        memory: &#x27;寄存器最靠近计算单元，HBM 容量最大；数据越能在片上重复使用，访问 HBM 越少。&#x27;,
        bounds: &#x27;搬运多、计算少容易受内存限制；数据复用高、乘加多则更可能受计算能力限制。&#x27;
      };

      const buttons = Array.from(root.querySelectorAll(&#x27;[data-gpu-view]&#x27;));
      const panels = Array.from(root.querySelectorAll(&#x27;[data-gpu-panel]&#x27;));
      const status = root.querySelector(&#x27;.status-line&#x27;);

      buttons.forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          const selected = button.getAttribute(&#x27;data-gpu-view&#x27;);
          buttons.forEach((candidate) =&gt; {
            const active = candidate === button;
            candidate.setAttribute(&#x27;aria-pressed&#x27;, String(active));
            candidate.classList.toggle(&#x27;btn-primary&#x27;, active);
          });
          panels.forEach((panel) =&gt; {
            panel.style.display = panel.getAttribute(&#x27;data-gpu-panel&#x27;) === selected ? &#x27;&#x27; : &#x27;none&#x27;;
          });
          if (status) status.textContent = descriptions[selected];
        });
      });
    })();
  &lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;

  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);

}

svg {
  display: block;
  max-width: 100%;

}

}

.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;gpu-parallel-reduction&quot;&gt;
  &lt;div class=&quot;viz-controls&quot; aria-label=&quot;并行求和步骤&quot;&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-view=&quot;mapping&quot; aria-pressed=&quot;true&quot;&gt;1 数据分工&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-view=&quot;registers&quot; aria-pressed=&quot;false&quot;&gt;2 读入寄存器&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-view=&quot;shared&quot; aria-pressed=&quot;false&quot;&gt;3 存入 Shared&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-view=&quot;round32&quot; aria-pressed=&quot;false&quot;&gt;4 32 路同时加&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-view=&quot;rounds&quot; aria-pressed=&quot;false&quot;&gt;5 后续计算&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-view=&quot;storage&quot; aria-pressed=&quot;false&quot;&gt;6 数据存放变化&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-view=&quot;timeline&quot; aria-pressed=&quot;false&quot;&gt;7 Warp 时间线&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-view=&quot;overview&quot; aria-pressed=&quot;false&quot;&gt;8 完整过程&lt;/button&gt;
  &lt;/div&gt;
  &lt;div id=&quot;gpu-parallel-stage&quot;&gt;
    &lt;svg id=&quot;gpu-parallel-svg&quot; viewBox=&quot;0 0 1200 790&quot; role=&quot;img&quot; aria-labelledby=&quot;gpu-parallel-title gpu-parallel-desc&quot;&gt;&lt;/svg&gt;
    &lt;div id=&quot;gpu-parallel-status&quot; class=&quot;text-small&quot; aria-live=&quot;polite&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;style&gt;
  #gpu-parallel-reduction {
    color: var(--foreground);
    width: 100%;
  }
  #gpu-parallel-reduction .viz-controls {
    margin-bottom: 0.75rem;
  }
  #gpu-parallel-svg {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;
    font-family: inherit;
  }
  #gpu-parallel-status {
    color: var(--muted-foreground);
    min-height: 1.5rem;
    padding-top: 0.35rem;
    text-align: center;
  }
  #gpu-parallel-svg .title {
    fill: var(--foreground);
    font-size: calc(var(--font-size-base) * 1.28);
    font-weight: 500;
  }
  #gpu-parallel-svg .kicker,
  #gpu-parallel-svg .muted {
    fill: var(--muted-foreground);
    font-size: calc(var(--font-size-base) * 0.74);
    font-weight: 400;
  }
  #gpu-parallel-svg .label {
    fill: var(--foreground);
    font-size: calc(var(--font-size-base) * 0.88);
    font-weight: 500;
  }
  #gpu-parallel-svg .body {
    fill: var(--foreground);
    font-size: calc(var(--font-size-base) * 0.74);
    font-weight: 400;
  }
  #gpu-parallel-svg .small {
    fill: var(--muted-foreground);
    font-size: calc(var(--font-size-base) * 0.64);
    font-weight: 400;
  }
  #gpu-parallel-svg .value {
    fill: var(--foreground);
    font-size: calc(var(--font-size-base) * 1.04);
    font-weight: 500;
  }
  #gpu-parallel-svg .frame {
    fill: var(--card);
    stroke: var(--border);
    stroke-width: 1.5;
  }
  #gpu-parallel-svg .neutral {
    fill: var(--muted);
    stroke: var(--border);
    stroke-width: 1.2;
  }
  #gpu-parallel-svg .s1 {
    fill: color-mix(in srgb, var(--viz-series-1) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-1) 72%, var(--border));
    stroke-width: 1.5;
  }
  #gpu-parallel-svg .s2 {
    fill: color-mix(in srgb, var(--viz-series-2) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-2) 72%, var(--border));
    stroke-width: 1.5;
  }
  #gpu-parallel-svg .s3 {
    fill: color-mix(in srgb, var(--viz-series-3) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-3) 72%, var(--border));
    stroke-width: 1.5;
  }
  #gpu-parallel-svg .s4 {
    fill: color-mix(in srgb, var(--viz-series-4) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-4) 72%, var(--border));
    stroke-width: 1.5;
  }
  #gpu-parallel-svg .s5 {
    fill: color-mix(in srgb, var(--viz-series-5) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-5) 72%, var(--border));
    stroke-width: 1.5;
  }
  #gpu-parallel-svg .s6 {
    fill: color-mix(in srgb, var(--viz-series-6) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-6) 72%, var(--border));
    stroke-width: 1.5;
  }
  #gpu-parallel-svg .inactive {
    fill: color-mix(in srgb, var(--muted) 72%, transparent);
    stroke: var(--border);
    stroke-width: 1;
  }
  #gpu-parallel-svg .line {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
  }
  #gpu-parallel-svg .flow1 {
    fill: none;
    stroke: var(--viz-series-1);
    stroke-width: 3;
    marker-end: url(#parallel-arrow-1);
  }
  #gpu-parallel-svg .flow2 {
    fill: none;
    stroke: var(--viz-series-2);
    stroke-width: 3;
    marker-end: url(#parallel-arrow-2);
  }
  #gpu-parallel-svg .flow3 {
    fill: none;
    stroke: var(--viz-series-3);
    stroke-width: 3;
    marker-end: url(#parallel-arrow-3);
  }
  #gpu-parallel-svg .flow4 {
    fill: none;
    stroke: var(--viz-series-4);
    stroke-width: 3;
    marker-end: url(#parallel-arrow-4);
  }
  #gpu-parallel-svg .dash {
    stroke-dasharray: 7 6;
  }
  #gpu-parallel-svg .badge {
    fill: var(--primary);
    stroke: none;
  }
  #gpu-parallel-svg .badge-text {
    fill: var(--primary-foreground);
    font-size: calc(var(--font-size-base) * 0.66);
    font-weight: 500;
  }
&lt;/style&gt;

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;gpu-parallel-reduction&#x27;);
  const svg = document.getElementById(&#x27;gpu-parallel-svg&#x27;);
  const status = document.getElementById(&#x27;gpu-parallel-status&#x27;);
  const buttons = Array.from(root.querySelectorAll(&#x27;[data-view]&#x27;));
  const input = Array.from({length: 64}, (_, i) =&gt; i + 1);
  const after32 = Array.from({length: 32}, (_, i) =&gt; input[i] + input[i + 32]);
  const after16 = Array.from({length: 16}, (_, i) =&gt; after32[i] + after32[i + 16]);
  const after8 = Array.from({length: 8}, (_, i) =&gt; after16[i] + after16[i + 8]);
  const after4 = Array.from({length: 4}, (_, i) =&gt; after8[i] + after8[i + 4]);
  const after2 = Array.from({length: 2}, (_, i) =&gt; after4[i] + after4[i + 2]);
  const after1 = [after2[0] + after2[1]];

  const views = {
    mapping: {
      index: 1,
      title: &#x27;先分工：64 个线程各负责一个输入元素&#x27;,
      detail: &#x27;Block 有 64 个线程，组成两个 Warp；Thread tid 负责 HBM 中的 x[tid]。&#x27;,
      draw: drawMapping
    },
    registers: {
      index: 2,
      title: &#x27;并行读取：每个线程把自己的数放进私有寄存器&#x27;,
      detail: &#x27;同一 Warp 的 32 个线程执行同一条 Load 指令，但使用各自的 tid 计算不同地址。&#x27;,
      draw: drawRegisters
    },
    shared: {
      index: 3,
      title: &#x27;显式存放：64 个寄存器值写入 64 个 Shared Memory 槽位&#x27;,
      detail: &#x27;Shared Memory 属于当前 Block；s[tid] 与线程 tid 一一对应，写完后先同步。&#x27;,
      draw: drawShared
    },
    round32: {
      index: 4,
      title: &#x27;第一次归约：一个 Warp 的 32 条 Lane 同时做 32 次加法&#x27;,
      detail: &#x27;同一条指令在 32 条 Lane 上并行执行：s[tid] += s[tid+32]。&#x27;,
      draw: drawRound32
    },
    rounds: {
      index: 5,
      title: &#x27;继续归约：活跃线程逐轮减半，数值一步步汇总&#x27;,
      detail: &#x27;每轮都先完成一批并行加法，再同步，然后把 stride 从 16 降到 1。&#x27;,
      draw: drawRounds
    },
    storage: {
      index: 6,
      title: &#x27;数据到底存在哪里：每个阶段都有明确位置&#x27;,
      detail: &#x27;HBM 输入保持不变；寄存器保存线程私有副本；Shared 保存中间结果；最终只写一个输出。&#x27;,
      draw: drawStorage
    },
    timeline: {
      index: 7,
      title: &#x27;SM 的时间线：一个 Warp 等数据时，另一个 Warp 占用计算单元&#x27;,
      detail: &#x27;Latency hiding 没有消除 HBM 延迟，只是用其他已就绪 Warp 的工作覆盖等待。&#x27;,
      draw: drawTimeline
    },
    overview: {
      index: 8,
      title: &#x27;完整过程：64 次读取、63 次加法、1 次写回&#x27;,
      detail: &#x27;并行来自许多 Lane 同时执行相同指令；效率来自中间结果尽量留在 SM 的片上存储。&#x27;,
      draw: drawOverview
    }
  };

  function esc(value) {
    return String(value).replace(/[&amp;&lt;&gt;&quot;&#x27;]/g, ch =&gt; ({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#039;&#x27;}[ch]));
  }

  function defs(view) {
    return `&lt;title id=&quot;gpu-parallel-title&quot;&gt;${esc(view.title)}&lt;/title&gt;&lt;desc id=&quot;gpu-parallel-desc&quot;&gt;${esc(view.detail)}&lt;/desc&gt;
      &lt;defs&gt;
        &lt;marker id=&quot;parallel-arrow-1&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-1)&quot;/&gt;&lt;/marker&gt;
        &lt;marker id=&quot;parallel-arrow-2&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-2)&quot;/&gt;&lt;/marker&gt;
        &lt;marker id=&quot;parallel-arrow-3&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-3)&quot;/&gt;&lt;/marker&gt;
        &lt;marker id=&quot;parallel-arrow-4&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-4)&quot;/&gt;&lt;/marker&gt;
      &lt;/defs&gt;`;
  }

  function header(view) {
    return `&lt;text x=&quot;48&quot; y=&quot;39&quot; class=&quot;kicker&quot;&gt;具体计算 · ${view.index} / 8&lt;/text&gt;&lt;text x=&quot;48&quot; y=&quot;76&quot; class=&quot;title&quot;&gt;${esc(view.title)}&lt;/text&gt;`;
  }

  function box(x, y, w, h, title, lines = [], cls = &#x27;frame&#x27;) {
    return `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;${h}&quot; rx=&quot;16&quot; class=&quot;${cls}&quot;/&gt;&lt;text x=&quot;${x + 16}&quot; y=&quot;${y + 29}&quot; class=&quot;label&quot;&gt;${esc(title)}&lt;/text&gt;${lines.map((line, i) =&gt; `&lt;text x=&quot;${x + 16}&quot; y=&quot;${y + 56 + i * 24}&quot; class=&quot;body&quot;&gt;${esc(line)}&lt;/text&gt;`).join(&#x27;&#x27;)}`;
  }

  function arrow(x1, y1, x2, y2, label = &#x27;&#x27;, cls = &#x27;flow1&#x27;) {
    const tx = (x1 + x2) / 2;
    const ty = (y1 + y2) / 2 - 9;
    return `&lt;path d=&quot;M ${x1} ${y1} L ${x2} ${y2}&quot; class=&quot;${cls}&quot;/&gt;${label ? `&lt;text x=&quot;${tx}&quot; y=&quot;${ty}&quot; text-anchor=&quot;middle&quot; class=&quot;muted&quot;&gt;${esc(label)}&lt;/text&gt;` : &#x27;&#x27;}`;
  }

  function pill(x, y, w, text) {
    return `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;28&quot; rx=&quot;14&quot; class=&quot;badge&quot;/&gt;&lt;text x=&quot;${x + w / 2}&quot; y=&quot;${y + 19}&quot; text-anchor=&quot;middle&quot; class=&quot;badge-text&quot;&gt;${esc(text)}&lt;/text&gt;`;
  }

  function footer(text) {
    return `&lt;rect x=&quot;48&quot; y=&quot;720&quot; width=&quot;1104&quot; height=&quot;42&quot; rx=&quot;12&quot; class=&quot;neutral&quot;/&gt;&lt;text x=&quot;600&quot; y=&quot;747&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;${esc(text)}&lt;/text&gt;`;
  }

  function memoryCells(values, startIndex, x, y, options = {}) {
    const cols = options.cols || 32;
    const cellW = options.cellW || 31;
    const cellH = options.cellH || 46;
    const prefix = options.prefix || &#x27;x&#x27;;
    const cls = options.cls || &#x27;s1&#x27;;
    const inactiveFrom = Number.isInteger(options.inactiveFrom) ? options.inactiveFrom : values.length;
    let out = &#x27;&#x27;;
    values.forEach((value, i) =&gt; {
      const px = x + (i % cols) * cellW;
      const py = y + Math.floor(i / cols) * (cellH + 8);
      const active = i &lt; inactiveFrom;
      out += `&lt;rect x=&quot;${px}&quot; y=&quot;${py}&quot; width=&quot;${cellW - 3}&quot; height=&quot;${cellH}&quot; rx=&quot;5&quot; class=&quot;${active ? cls : &#x27;inactive&#x27;}&quot;/&gt;&lt;text x=&quot;${px + (cellW - 3) / 2}&quot; y=&quot;${py + 15}&quot; text-anchor=&quot;middle&quot; class=&quot;small&quot;&gt;${esc(prefix)}${startIndex + i}&lt;/text&gt;&lt;text x=&quot;${px + (cellW - 3) / 2}&quot; y=&quot;${py + 36}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;${esc(value)}&lt;/text&gt;`;
    });
    return out;
  }

  function registerCells(values, startIndex, x, y, cls) {
    let out = &#x27;&#x27;;
    values.forEach((value, i) =&gt; {
      const px = x + i * 24;
      out += `&lt;rect x=&quot;${px}&quot; y=&quot;${y}&quot; width=&quot;21&quot; height=&quot;56&quot; rx=&quot;5&quot; class=&quot;${cls}&quot;/&gt;&lt;text x=&quot;${px + 10.5}&quot; y=&quot;${y + 18}&quot; text-anchor=&quot;middle&quot; class=&quot;small&quot;&gt;T${startIndex + i}&lt;/text&gt;&lt;text x=&quot;${px + 10.5}&quot; y=&quot;${y + 42}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;${value}&lt;/text&gt;`;
    });
    return out;
  }

  function drawMapping(view) {
    return `${defs(view)}${header(view)}
      &lt;rect x=&quot;48&quot; y=&quot;112&quot; width=&quot;1104&quot; height=&quot;244&quot; rx=&quot;22&quot; class=&quot;frame&quot;/&gt;
      &lt;text x=&quot;72&quot; y=&quot;144&quot; class=&quot;label&quot;&gt;HBM 输入数组 x[0…63]：上面是地址，下面是数值&lt;/text&gt;
      ${memoryCells(input.slice(0, 32), 0, 88, 166, {prefix:&#x27;x&#x27;, cls:&#x27;s1&#x27;})}
      ${memoryCells(input.slice(32), 32, 88, 228, {prefix:&#x27;x&#x27;, cls:&#x27;s1&#x27;})}
      &lt;rect x=&quot;48&quot; y=&quot;388&quot; width=&quot;1104&quot; height=&quot;286&quot; rx=&quot;22&quot; class=&quot;frame&quot;/&gt;
      &lt;text x=&quot;72&quot; y=&quot;422&quot; class=&quot;label&quot;&gt;线程分工：tid 就是线程编号&lt;/text&gt;
      ${box(82, 454, 488, 154, &#x27;Warp 0 · Thread 0…31&#x27;, [&#x27;T0 → x[0] = 1&#x27;, &#x27;T1 → x[1] = 2&#x27;, &#x27;…&#x27;, &#x27;T31 → x[31] = 32&#x27;], &#x27;s2&#x27;)}
      ${box(630, 454, 488, 154, &#x27;Warp 1 · Thread 32…63&#x27;, [&#x27;T32 → x[32] = 33&#x27;, &#x27;T33 → x[33] = 34&#x27;, &#x27;…&#x27;, &#x27;T63 → x[63] = 64&#x27;], &#x27;s3&#x27;)}
      ${pill(154, 628, 344, &#x27;Warp 0：32 个线程处理前半段&#x27;)}${pill(702, 628, 344, &#x27;Warp 1：32 个线程处理后半段&#x27;)}
      ${footer(&#x27;这一阶段没有做加法，只完成“哪个线程负责哪个地址”的映射。&#x27;)}`;
  }

  function drawRegisters(view) {
    return `${defs(view)}${header(view)}
      &lt;rect x=&quot;48&quot; y=&quot;112&quot; width=&quot;212&quot; height=&quot;554&quot; rx=&quot;22&quot; class=&quot;frame&quot;/&gt;
      &lt;text x=&quot;154&quot; y=&quot;146&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;读取路径&lt;/text&gt;
      ${box(76, 176, 156, 76, &#x27;HBM&#x27;, [&#x27;x[0…63]&#x27;], &#x27;s1&#x27;)}
      ${arrow(154, 252, 154, 294, &#x27;&#x27;, &#x27;flow1&#x27;)}
      ${box(76, 294, 156, 76, &#x27;L2&#x27;, [&#x27;全 GPU 共享&#x27;], &#x27;s2&#x27;)}
      ${arrow(154, 370, 154, 412, &#x27;&#x27;, &#x27;flow2&#x27;)}
      ${box(76, 412, 156, 76, &#x27;L1&#x27;, [&#x27;当前 SM&#x27;], &#x27;s3&#x27;)}
      ${arrow(154, 488, 154, 530, &#x27;&#x27;, &#x27;flow3&#x27;)}
      ${box(76, 530, 156, 92, &#x27;寄存器&#x27;, [&#x27;每线程私有&#x27;], &#x27;s4&#x27;)}
      &lt;rect x=&quot;300&quot; y=&quot;112&quot; width=&quot;852&quot; height=&quot;554&quot; rx=&quot;22&quot; class=&quot;s4&quot;/&gt;

  function drawShared(view) {

  function drawRounds(view) {

  function storageRow(y, phase, hbm, reg, shared, out, cls) {

      ${storageRow(238, &#x27;Load 后&#x27;, &#x27;1…64|原数据仍在&#x27;, &#x27;T0.r=1…T63.r=64|64 份私有值&#x27;, &#x27;未初始化&#x27;, &#x27;空&#x27;, &#x27;s4&#x27;)}

      ${storageRow(574, &#x27;Store 后&#x27;, &#x27;1…64|输入仍保留&#x27;, &#x27;T0.r=2080&#x27;, &#x27;s[0]=2080&#x27;, &#x27;out[0]=2080|最终结果&#x27;, &#x27;s1&#x27;)}
      ${footer(&#x27;寄存器、Shared、L1/L2 和 HBM 不是一块内存的不同名字；它们有不同作用域、容量和访问代价。&#x27;)}`;

  function drawTimeline(view) {
    const x0 = 250;
    const unit = 90;
    let ticks = &#x27;&#x27;;
    for (let i = 0; i &lt;= 9; i += 1) {
      const x = x0 + i * unit;
      ticks += `&lt;line x1=&quot;${x}&quot; y1=&quot;148&quot; x2=&quot;${x}&quot; y2=&quot;608&quot; class=&quot;line&quot;/&gt;&lt;text x=&quot;${x}&quot; y=&quot;132&quot; text-anchor=&quot;middle&quot; class=&quot;small&quot;&gt;t${i}&lt;/text&gt;`;
    }
    function bar(rowY, start, end, text, cls) {
      const x = x0 + start * unit + 4;
      const w = (end - start) * unit - 8;
      return `&lt;rect x=&quot;${x}&quot; y=&quot;${rowY}&quot; width=&quot;${w}&quot; height=&quot;44&quot; rx=&quot;9&quot; class=&quot;${cls}&quot;/&gt;&lt;text x=&quot;${x + w / 2}&quot; y=&quot;${rowY + 28}&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;${esc(text)}&lt;/text&gt;`;
    }
    return `${defs(view)}${header(view)}
      &lt;text x=&quot;60&quot; y=&quot;132&quot; class=&quot;label&quot;&gt;SM 调度时间 →&lt;/text&gt;${ticks}
      &lt;text x=&quot;60&quot; y=&quot;206&quot; class=&quot;label&quot;&gt;Warp 0&lt;/text&gt;${bar(176,0,1,&#x27;发出 Load&#x27;,&#x27;s1&#x27;)}${bar(176,1,4,&#x27;等待 HBM&#x27;,&#x27;inactive&#x27;)}${bar(176,4,6,&#x27;写 Shared&#x27;,&#x27;s2&#x27;)}${bar(176,6,8,&#x27;32 路加法&#x27;,&#x27;s3&#x27;)}
      &lt;text x=&quot;60&quot; y=&quot;294&quot; class=&quot;label&quot;&gt;Warp 1&lt;/text&gt;${bar(264,1,2,&#x27;发出 Load&#x27;,&#x27;s1&#x27;)}${bar(264,2,5,&#x27;等待 HBM&#x27;,&#x27;inactive&#x27;)}${bar(264,5,7,&#x27;写 Shared&#x27;,&#x27;s2&#x27;)}
      &lt;text x=&quot;60&quot; y=&quot;382&quot; class=&quot;label&quot;&gt;其他就绪 Warp&lt;/text&gt;${bar(352,2,4,&#x27;执行其他 Block 的计算&#x27;,&#x27;s4&#x27;)}${bar(352,8,9,&#x27;继续运行&#x27;,&#x27;s4&#x27;)}
      &lt;text x=&quot;60&quot; y=&quot;470&quot; class=&quot;label&quot;&gt;计算单元&lt;/text&gt;${bar(440,0,1,&#x27;Load&#x27;,&#x27;s1&#x27;)}${bar(440,1,2,&#x27;Load&#x27;,&#x27;s1&#x27;)}${bar(440,2,4,&#x27;有用计算&#x27;,&#x27;s4&#x27;)}${bar(440,4,7,&#x27;Store Shared&#x27;,&#x27;s2&#x27;)}${bar(440,7,9,&#x27;归约加法&#x27;,&#x27;s3&#x27;)}
      &lt;rect x=&quot;250&quot; y=&quot;536&quot; width=&quot;810&quot; height=&quot;72&quot; rx=&quot;14&quot; class=&quot;neutral&quot;/&gt;
      &lt;text x=&quot;655&quot; y=&quot;566&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;等待没有消失，但 SM 没有跟着一起闲着&lt;/text&gt;
      &lt;text x=&quot;655&quot; y=&quot;592&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;调度器从许多活跃 Warp 中选择已就绪者，把 HBM 等待时间覆盖掉。&lt;/text&gt;
      ${footer(&#x27;图中的时间长度只是概念示意；文章的重点是“一个 Warp 等待，另一个 Warp 可以运行”。&#x27;)}`;
  }

  function drawOverview(view) {
    return `${defs(view)}${header(view)}
      ${box(48, 132, 178, 174, &#x27;HBM 输入&#x27;, [&#x27;x[0…63]=1…64&#x27;, &#x27;64 次元素读取&#x27;, &#x27;片外、大容量&#x27;], &#x27;s1&#x27;)}
      ${arrow(226, 219, 300, 219, &#x27;Load&#x27;, &#x27;flow1&#x27;)}
      ${box(300, 132, 188, 174, &#x27;64 个寄存器&#x27;, [&#x27;T0.r=1&#x27;, &#x27;…&#x27;, &#x27;T63.r=64&#x27;], &#x27;s4&#x27;)}
      ${arrow(488, 219, 562, 219, &#x27;显式写入&#x27;, &#x27;flow4&#x27;)}
      ${box(562, 132, 262, 174, &#x27;Shared Memory&#x27;, [&#x27;s[0…63]=1…64&#x27;, &#x27;保存全部中间结果&#x27;, &#x27;当前 Block 共享&#x27;], &#x27;s5&#x27;)}
      ${arrow(824, 219, 898, 219, &#x27;Store&#x27;, &#x27;flow2&#x27;)}
      ${box(898, 132, 254, 174, &#x27;HBM 输出&#x27;, [&#x27;out[0]=2080&#x27;, &#x27;只写回 1 个结果&#x27;], &#x27;s2&#x27;)}
      &lt;rect x=&quot;48&quot; y=&quot;344&quot; width=&quot;1104&quot; height=&quot;302&quot; rx=&quot;22&quot; class=&quot;frame&quot;/&gt;
      &lt;text x=&quot;72&quot; y=&quot;378&quot; class=&quot;label&quot;&gt;Shared Memory 中发生的 63 次加法&lt;/text&gt;
      ${pill(82, 406, 196, &#x27;stride 32 · 32 次并行&#x27;)}${pill(292, 406, 178, &#x27;stride 16 · 16 次&#x27;)}${pill(484, 406, 160, &#x27;stride 8 · 8 次&#x27;)}${pill(658, 406, 160, &#x27;stride 4 · 4 次&#x27;)}${pill(832, 406, 142, &#x27;stride 2 · 2 次&#x27;)}${pill(988, 406, 142, &#x27;stride 1 · 1 次&#x27;)}
      &lt;text x=&quot;600&quot; y=&quot;492&quot; text-anchor=&quot;middle&quot; class=&quot;value&quot;&gt;32 + 16 + 8 + 4 + 2 + 1 = 63 次加法&lt;/text&gt;
      &lt;text x=&quot;600&quot; y=&quot;536&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;同一轮中的加法并行执行；下一轮必须等待上一轮产生的新中间值。&lt;/text&gt;
      &lt;text x=&quot;600&quot; y=&quot;578&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;这个求和使用 SM 的普通算术单元；Tensor Core 主要用于矩阵乘法，不参与本例。&lt;/text&gt;
      ${pill(398, 604, 404, &#x27;最终：1 + 2 + … + 64 = 2080&#x27;)}
      ${footer(&#x27;一张图记住：Thread 决定数据项，Warp 提供并行执行，Shared 保存协作中间值，HBM 保存长期输入输出。&#x27;)}`;
  }

  function render(id) {
    const selected = views[id] ? id : &#x27;mapping&#x27;;
    const view = views[selected];
    svg.innerHTML = view.draw(view);
    status.textContent = view.detail;
    buttons.forEach(button =&gt; {
      const active = button.dataset.view === selected;
      button.setAttribute(&#x27;aria-pressed&#x27;, String(active));
      button.classList.toggle(&#x27;btn-primary&#x27;, active);
    });
    if (window.location.hash !== `#${selected}`) history.replaceState(null, &#x27;&#x27;, `#${selected}`);
  }

  buttons.forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; render(button.dataset.view)));
  window.addEventListener(&#x27;hashchange&#x27;, () =&gt; render(window.location.hash.slice(1)));
  const initial = window.location.hash.slice(1);
  render(views[initial] ? initial : &#x27;mapping&#x27;);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [

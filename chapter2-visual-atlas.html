  left: 0;

.sr-only {

  height: 20px;

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;chapter2-atlas&#x27;);

  const svg = document.getElementById(&#x27;chapter2-svg&#x27;);
  const detail = document.getElementById(&#x27;chapter2-detail&#x27;);

  const sections = {
    &#x27;network-overview&#x27;: {
      group: &#x27;超大规模网络 · 1 / 7&#x27;,
      title: &#x27;把 72 个 GPU 组织成“一台机器”&#x27;,
      detail: &#x27;记忆主线：超级芯片解决单节点算力，NVLink + NVSwitch 解决 72 GPU 的高速协作。&#x27;,
      draw: drawNetworkOverview
    },
    &#x27;nvlink-nvswitch&#x27;: {
      group: &#x27;超大规模网络 · 2 / 7&#x27;,
      title: &#x27;NVLink 是高速公路，NVSwitch 是立交枢纽&#x27;,
      detail: &#x27;单 GPU 的 18 条 NVLink 5 分别接到 18 个 NVSwitch；任意两块 GPU 只经过一个交换级。&#x27;,
      draw: drawNvlink
    },
    &#x27;multi-gpu&#x27;: {
      group: &#x27;超大规模网络 · 3 / 7&#x27;,
      title: &#x27;多 GPU 编程：能直接访问，不等于自动一致&#x27;,
      detail: &#x27;统一地址视图让访问更直接；NCCL / NVSHMEM 仍负责同步、排序和集合通信。&#x27;,
      draw: drawMultiGpu
    },
    &#x27;sharp&#x27;: {
      group: &#x27;超大规模网络 · 4 / 7&#x27;,
      title: &#x27;SHARP：让交换机顺手完成“求和”&#x27;,
      detail: &#x27;梯度归约在 NVSwitch 的 SHARP 引擎中合并，减少网络流量，也让 GPU 少做通信杂活。&#x27;,
      draw: drawSharp
    },
    &#x27;multirack&#x27;: {
      group: &#x27;超大规模网络 · 5 / 7&#x27;,
      title: &#x27;出机架以后：DPU + NIC 接管数据搬运&#x27;,
      detail: &#x27;机架内优先走 NVLink；跨机架或访问存储走 InfiniBand / Ethernet，并用 GPUDirect RDMA 直达显存。&#x27;,
      draw: drawMultirack
    },
    &#x27;appliance&#x27;: {
      group: &#x27;超大规模网络 · 6 / 7&#x27;,
      title: &#x27;预集成机架：交付的是一整台 AI 超级计算机&#x27;,
      detail: &#x27;18 个计算节点、9 个交换托盘、供电、液冷和管理软件在交付前已装配与验证。&#x27;,

    &#x27;cpo&#x27;: {
      group: &#x27;超大规模网络 · 7 / 7&#x27;,

      detail: &#x27;缩短高速电信号路径，用更低功耗把 800 Gb/s、1.6 Tb/s 乃至更高速率送到更多机架。&#x27;,

    &#x27;power&#x27;: {

    },
    &#x27;cooling&#x27;: {
      group: &#x27;机架运营 · 2 / 5&#x27;,
      title: &#x27;液冷闭环：让热量沿着水路离开芯片&#x27;,

      draw: drawCooling
    },
    &#x27;monitoring&#x27;: {
      group: &#x27;机架运营 · 3 / 5&#x27;,
      title: &#x27;监控不是看“快不快”，而是找“在等谁”&#x27;,
      detail: &#x27;GPU 利用率、NVLink、存储、温度和功耗要一起看，才能定位数据供给、同步或通信瓶颈。&#x27;,
      draw: drawMonitoring
    },
    &#x27;scheduling&#x27;: {
      group: &#x27;机架运营 · 4 / 5&#x27;,
      title: &#x27;共享与调度：把 72 GPU 切成合适的工作单元&#x27;,
      detail: &#x27;SLURM / Kubernetes 分配 GPU 组；MIG 可把单卡硬件隔离成最多 7 个小实例。&#x27;,

    &#x27;roi&#x27;: {

      detail: &#x27;书中 100×H100 对 50×Blackwell 是示意案例；真实回报必须代入价格、利用率、电价和迁移成本。&#x27;,
      draw: drawRoi

    &#x27;roadmap&#x27;: {
      group: &#x27;路线图与总结 · 1 / 7&#x27;,
      title: &#x27;路线图的规律：每代把一个关键维度大幅推高&#x27;,
      detail: &#x27;从 B200 到 Feynman，主线是更多显存、更高算力、更快互连和更紧密的系统集成。&#x27;,
      draw: drawRoadmap
    },
    &#x27;b300&#x27;: {
      group: &#x27;路线图与总结 · 2 / 7&#x27;,
      title: &#x27;Blackwell Ultra：同一机架形态的“加量升级”&#x27;,
      detail: &#x27;书中给出的对比：B300 约 288 GB HBM、1.5× AI 计算，并保持 NVLink 5 机架互连。&#x27;,
      draw: drawB300

    &#x27;vera-rubin&#x27;: {
      group: &#x27;路线图与总结 · 3 / 7&#x27;,

    },
    &#x27;rubin-ultra&#x27;: {
      group: &#x27;路线图与总结 · 4 / 7&#x27;,

    &#x27;feynman&#x27;: {

      detail: &#x27;2 nm、HBM5、更多 die 等均是书中“likely / perhaps”式展望；真正要记的是推理需求推动低精度与互连继续演进。&#x27;,
      draw: drawFeynman

    &#x27;takeaways&#x27;: {
      group: &#x27;路线图与总结 · 6 / 7&#x27;,
      title: &#x27;本章关键要点：一切围绕“别让算力等数据”&#x27;,
      detail: &#x27;芯片、内存、互连、机架、液冷和软件共同决定有效吞吐，而不是只看 GPU 峰值 FLOPS。&#x27;,

      draw: drawConclusion

  };

  function defs(title, desc) {
    return `&lt;title id=&quot;chapter2-svg-title&quot;&gt;${esc(title)}&lt;/title&gt;
      &lt;desc id=&quot;chapter2-svg-desc&quot;&gt;${esc(desc)}&lt;/desc&gt;
      &lt;defs&gt;
        &lt;marker id=&quot;atlas-arrow-1&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-1)&quot;/&gt;&lt;/marker&gt;
        &lt;marker id=&quot;atlas-arrow-2&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-2)&quot;/&gt;&lt;/marker&gt;
        &lt;marker id=&quot;atlas-arrow-3&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-3)&quot;/&gt;&lt;/marker&gt;

  function header(section) {
    return `&lt;text x=&quot;48&quot; y=&quot;42&quot; class=&quot;scene-kicker&quot;&gt;${esc(section.group)}&lt;/text&gt;
      &lt;text x=&quot;48&quot; y=&quot;76&quot; class=&quot;scene-title&quot;&gt;${esc(section.title)}&lt;/text&gt;`;

  function box(x, y, w, h, title, lines = [], cls = &#x27;struct&#x27;) {
    const body = lines.map((line, i) =&gt; `&lt;text x=&quot;${x + 18}&quot; y=&quot;${y + 56 + i * 23}&quot; class=&quot;body&quot;&gt;${esc(line)}&lt;/text&gt;`).join(&#x27;&#x27;);
    return `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;${h}&quot; rx=&quot;16&quot; class=&quot;${cls}&quot;/&gt;
      &lt;text x=&quot;${x + 18}&quot; y=&quot;${y + 30}&quot; class=&quot;node-title&quot;&gt;${esc(title)}&lt;/text&gt;${body}`;
  }

  function pill(x, y, w, text) {
    return `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;28&quot; rx=&quot;14&quot; class=&quot;badge&quot;/&gt;&lt;text x=&quot;${x + w / 2}&quot; y=&quot;${y + 19}&quot; text-anchor=&quot;middle&quot; class=&quot;badge-text&quot;&gt;${esc(text)}&lt;/text&gt;`;

  function arrow(x1, y1, x2, y2, label = &#x27;&#x27;, cls = &#x27;flow1&#x27;) {
    const lx = (x1 + x2) / 2;
    const ly = (y1 + y2) / 2 - 10;
    return `&lt;path d=&quot;M ${x1} ${y1} L ${x2} ${y2}&quot; class=&quot;${cls}&quot;/&gt;${label ? `&lt;text x=&quot;${lx}&quot; y=&quot;${ly}&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;${esc(label)}&lt;/text&gt;` : &#x27;&#x27;}`;

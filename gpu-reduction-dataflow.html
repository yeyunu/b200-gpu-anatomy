html&gt;body{padding:0}&lt;/style&gt;

&lt;body&gt;
&lt;div id=&quot;gpu-reduction-dataflow&quot;&gt;
  &lt;div class=&quot;viz-controls&quot; aria-label=&quot;数据流步骤&quot;&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-step=&quot;task&quot; aria-pressed=&quot;true&quot;&gt;1 任务&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-step=&quot;dispatch&quot; aria-pressed=&quot;false&quot;&gt;2 分配到 SM&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-step=&quot;warps&quot; aria-pressed=&quot;false&quot;&gt;3 拆成 Warp&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-step=&quot;load&quot; aria-pressed=&quot;false&quot;&gt;4 读取与隐藏延迟&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-step=&quot;reduce&quot; aria-pressed=&quot;false&quot;&gt;5 Shared Memory 归约&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-step=&quot;store&quot; aria-pressed=&quot;false&quot;&gt;6 写回结果&lt;/button&gt;

  &lt;/div&gt;

&lt;style&gt;
  #gpu-reduction-dataflow {

  }

  }
  #gpu-reduction-svg .kicker,
  #gpu-reduction-svg .muted {

  }
  #gpu-reduction-svg .label {

  }
  #gpu-reduction-svg .body {
    fill: var(--foreground);

  #gpu-reduction-svg .tiny {

  #gpu-reduction-svg .frame {

  }

  #gpu-reduction-svg .s1 {
    fill: color-mix(in srgb, var(--viz-series-1) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-1) 72%, var(--border));

  }
  #gpu-reduction-svg .s2 {
    fill: color-mix(in srgb, var(--viz-series-2) 16%, transparent);

    stroke-width: 1.6;
  }
  #gpu-reduction-svg .s3 {
    fill: color-mix(in srgb, var(--viz-series-3) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-3) 72%, var(--border));
    stroke-width: 1.6;
  }
  #gpu-reduction-svg .s4 {
    fill: color-mix(in srgb, var(--viz-series-4) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-4) 72%, var(--border));
    stroke-width: 1.6;
  }
  #gpu-reduction-svg .s5 {
    fill: color-mix(in srgb, var(--viz-series-5) 16%, transparent);
    stroke: color-mix(in srgb, var(--viz-series-5) 72%, var(--border));

  }
  #gpu-reduction-svg .s6 {
    fill: color-mix(in srgb, var(--viz-series-6) 16%, transparent);

  #gpu-reduction-svg .thread {

  #gpu-reduction-svg .thread-ready {

  #gpu-reduction-svg .thread-wait {
    fill: color-mix(in srgb, var(--viz-series-3) 30%, transparent);

  #gpu-reduction-svg .line {

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;gpu-reduction-dataflow&#x27;);
  const svg = document.getElementById(&#x27;gpu-reduction-svg&#x27;);
  const status = document.getElementById(&#x27;gpu-reduction-status&#x27;);
  const buttons = Array.from(root.querySelectorAll(&#x27;[data-step]&#x27;));

  const steps = {
    task: {
      title: &#x27;例子：把 HBM 中的 128 个数相加&#x27;,
      detail: &#x27;教学设定：输入为 1 到 128，使用 1 个包含 128 个线程的 Block；最终结果是 8256。&#x27;,
      draw: drawTask
    },
    dispatch: {
      title: &#x27;Kernel 启动后：Block 被分配给一个 SM&#x27;,
      detail: &#x27;GPU 有许多 SM；本例的一个 Block 在其中一个 SM 上运行，并使用该 SM 的寄存器、Shared Memory 与 L1。&#x27;,
      draw: drawDispatch
    },
    warps: {
      title: &#x27;128 个线程不是同时乱跑，而是组成 4 个 Warp&#x27;,
      detail: &#x27;每个 Warp 固定 32 个线程；同一 Warp 的线程以 SIMT 方式执行同一条指令。&#x27;,
      draw: drawWarps
    },
    load: {
      title: &#x27;每个线程读取一个数：HBM → L2 → L1 → 寄存器&#x27;,
      detail: &#x27;Warp 0 等待片外 HBM 数据时，SM 可以调度其他已就绪 Warp；这就是文章强调的 latency hiding。&#x27;,
      draw: drawLoad
    },
    reduce: {
      title: &#x27;线程把数放进 Shared Memory，再在 Block 内并行归约&#x27;,
      detail: &#x27;Shared Memory 属于 Block、位于 SM 上；示例用多轮两两相加把 128 个数缩成 1 个结果。&#x27;,
      draw: drawReduce
    },
    store: {
      title: &#x27;最后一个线程把 8256 写回 HBM&#x27;,
      detail: &#x27;最终和先在寄存器中，再经片上缓存与内存控制路径写回 HBM 的输出位置。&#x27;,
      draw: drawStore
    },
    overview: {
      title: &#x27;完整数据流：慢而大的 HBM，只负责输入和最终输出&#x27;,
      detail: &#x27;性能关键是减少反复访问 HBM，让中间数据尽量停留在寄存器、Shared Memory、L1 和 L2。&#x27;,
      draw: drawOverview
    }
  };

  function defs(step) {
    return `&lt;title id=&quot;gpu-reduction-title&quot;&gt;${esc(step.title)}&lt;/title&gt;
      &lt;desc id=&quot;gpu-reduction-desc&quot;&gt;${esc(step.detail)}&lt;/desc&gt;
      &lt;defs&gt;
        &lt;marker id=&quot;reduction-arrow-1&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-1)&quot;/&gt;&lt;/marker&gt;
        &lt;marker id=&quot;reduction-arrow-2&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-2)&quot;/&gt;&lt;/marker&gt;
        &lt;marker id=&quot;reduction-arrow-3&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-3)&quot;/&gt;&lt;/marker&gt;
        &lt;marker id=&quot;reduction-arrow-4&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--viz-series-4)&quot;/&gt;&lt;/marker&gt;
      &lt;/defs&gt;`;
  }

  function header(step, index) {
    return `&lt;text x=&quot;48&quot; y=&quot;39&quot; class=&quot;kicker&quot;&gt;具体例子 · 数据流 ${index} / 7&lt;/text&gt;&lt;text x=&quot;48&quot; y=&quot;76&quot; class=&quot;scene-title&quot;&gt;${esc(step.title)}&lt;/text&gt;`;
  }

  function box(x, y, w, h, title, lines = [], cls = &#x27;frame&#x27;) {
    return `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;${h}&quot; rx=&quot;16&quot; class=&quot;${cls}&quot;/&gt;
      &lt;text x=&quot;${x + 18}&quot; y=&quot;${y + 31}&quot; class=&quot;label&quot;&gt;${esc(title)}&lt;/text&gt;
      ${lines.map((line, i) =&gt; `&lt;text x=&quot;${x + 18}&quot; y=&quot;${y + 60 + i * 25}&quot; class=&quot;body&quot;&gt;${esc(line)}&lt;/text&gt;`).join(&#x27;&#x27;)}`;
  }

  function arrow(x1, y1, x2, y2, label = &#x27;&#x27;, cls = &#x27;flow1&#x27;) {
    const x = (x1 + x2) / 2;
    const y = (y1 + y2) / 2 - 10;
    return `&lt;path d=&quot;M ${x1} ${y1} L ${x2} ${y2}&quot; class=&quot;${cls}&quot;/&gt;${label ? `&lt;text x=&quot;${x}&quot; y=&quot;${y}&quot; text-anchor=&quot;middle&quot; class=&quot;muted&quot;&gt;${esc(label)}&lt;/text&gt;` : &#x27;&#x27;}`;
  }

  function pill(x, y, w, text) {
    return `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;28&quot; rx=&quot;14&quot; class=&quot;badge&quot;/&gt;&lt;text x=&quot;${x + w / 2}&quot; y=&quot;${y + 19}&quot; text-anchor=&quot;middle&quot; class=&quot;badge-text&quot;&gt;${esc(text)}&lt;/text&gt;`;
  }

  function footer(text) {
    return `&lt;rect x=&quot;48&quot; y=&quot;688&quot; width=&quot;1104&quot; height=&quot;44&quot; rx=&quot;12&quot; class=&quot;neutral&quot;/&gt;&lt;text x=&quot;600&quot; y=&quot;716&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;${esc(text)}&lt;/text&gt;`;
  }

  function numberCells(x, y, count = 16, active = -1) {
    let out = &#x27;&#x27;;
    for (let i = 0; i &lt; count; i += 1) {
      const col = i % 8;
      const row = Math.floor(i / 8);
      const px = x + col * 52;
      const py = y + row * 52;
      const label = i === count - 1 ? &#x27;128&#x27; : String(i + 1);
      out += `&lt;rect x=&quot;${px}&quot; y=&quot;${py}&quot; width=&quot;42&quot; height=&quot;38&quot; rx=&quot;7&quot; class=&quot;${i === active ? &#x27;s3&#x27; : &#x27;s1&#x27;}&quot;/&gt;&lt;text x=&quot;${px + 21}&quot; y=&quot;${py + 25}&quot; text-anchor=&quot;middle&quot; class=&quot;tiny&quot;&gt;${label}&lt;/text&gt;`;
    }
    return out;
  }

  function threadGrid(x, y, count, cls = &#x27;thread&#x27;, columns = 16, gapX = 26, gapY = 28) {
    let out = &#x27;&#x27;;
    for (let i = 0; i &lt; count; i += 1) {
      const px = x + (i % columns) * gapX;
      const py = y + Math.floor(i / columns) * gapY;
      out += `&lt;circle cx=&quot;${px}&quot; cy=&quot;${py}&quot; r=&quot;7&quot; class=&quot;${cls}&quot;/&gt;`;
    }
    return out;
  }

  function warpRow(x, y, warpIndex, cls = &#x27;thread&#x27;) {
    let out = `&lt;text x=&quot;${x - 72}&quot; y=&quot;${y + 5}&quot; class=&quot;label&quot;&gt;Warp ${warpIndex}&lt;/text&gt;`;
    for (let i = 0; i &lt; 32; i += 1) {
      out += `&lt;circle cx=&quot;${x + i * 25}&quot; cy=&quot;${y}&quot; r=&quot;7&quot; class=&quot;${cls}&quot;/&gt;`;
    }
    return out;
  }

  function smChip(x, y, w, h, label, cls = &#x27;s2&#x27;) {
    let pins = &#x27;&#x27;;
    for (let i = 0; i &lt; 5; i += 1) {
      const py = y + 20 + i * ((h - 40) / 4);
      pins += `&lt;line x1=&quot;${x - 8}&quot; y1=&quot;${py}&quot; x2=&quot;${x}&quot; y2=&quot;${py}&quot; class=&quot;line&quot;/&gt;&lt;line x1=&quot;${x + w}&quot; y1=&quot;${py}&quot; x2=&quot;${x + w + 8}&quot; y2=&quot;${py}&quot; class=&quot;line&quot;/&gt;`;
    }
    return `&lt;g&gt;${pins}&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;${h}&quot; rx=&quot;18&quot; class=&quot;${cls}&quot;/&gt;&lt;text x=&quot;${x + w / 2}&quot; y=&quot;${y + 35}&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;${esc(label)}&lt;/text&gt;&lt;/g&gt;`;
  }

  function memoryLayer(x, y, w, title, subtitle, cls) {
    return `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${w}&quot; height=&quot;72&quot; rx=&quot;14&quot; class=&quot;${cls}&quot;/&gt;&lt;text x=&quot;${x + w / 2}&quot; y=&quot;${y + 29}&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;${esc(title)}&lt;/text&gt;&lt;text x=&quot;${x + w / 2}&quot; y=&quot;${y + 54}&quot; text-anchor=&quot;middle&quot; class=&quot;tiny&quot;&gt;${esc(subtitle)}&lt;/text&gt;`;
  }

  function drawTask(step) {
    return `${defs(step)}${header(step, 1)}
      ${box(48, 122, 250, 172, &#x27;CPU 启动 Kernel&#x27;, [&#x27;示意调用：sum128&lt;&lt;&lt;1,128&gt;&gt;&gt;&#x27;, &#x27;1 个 Block · 128 个线程&#x27;, &#x27;每个线程先处理 1 个数&#x27;], &#x27;s2&#x27;)}
      ${arrow(298, 208, 400, 208, &#x27;启动任务&#x27;, &#x27;flow2&#x27;)}
      &lt;rect x=&quot;400&quot; y=&quot;112&quot; width=&quot;752&quot; height=&quot;448&quot; rx=&quot;24&quot; class=&quot;frame&quot;/&gt;
      &lt;text x=&quot;776&quot; y=&quot;150&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;GPU 的 HBM：输入数组 x[0…127]&lt;/text&gt;
      ${numberCells(475, 190, 16)}
      &lt;text x=&quot;683&quot; y=&quot;314&quot; text-anchor=&quot;middle&quot; class=&quot;muted&quot;&gt;图中省略中间元素：1, 2, 3, …, 128&lt;/text&gt;
      &lt;path d=&quot;M 500 360 L 1044 360&quot; class=&quot;line&quot;/&gt;
      &lt;text x=&quot;530&quot; y=&quot;410&quot; class=&quot;label&quot;&gt;目标&lt;/text&gt;
      &lt;text x=&quot;530&quot; y=&quot;456&quot; class=&quot;metric&quot;&gt;1 + 2 + ··· + 128 = 8256&lt;/text&gt;
      &lt;rect x=&quot;856&quot; y=&quot;396&quot; width=&quot;222&quot; height=&quot;96&quot; rx=&quot;16&quot; class=&quot;neutral&quot;/&gt;
      &lt;text x=&quot;967&quot; y=&quot;428&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;HBM 输出 out[0]&lt;/text&gt;
      &lt;text x=&quot;967&quot; y=&quot;466&quot; text-anchor=&quot;middle&quot; class=&quot;metric&quot;&gt;等待写入&lt;/text&gt;
      ${pill(486, 582, 228, &#x27;输入：128 个数&#x27;)}${pill(752, 582, 228, &#x27;输出：1 个总和&#x27;)}
      ${footer(&#x27;这是帮助理解文章结构的教学例子；128 个线程不是 Blackwell 的固定配置。&#x27;)}`;
  }

  function drawDispatch(step) {
    let sms = &#x27;&#x27;;
    for (let i = 0; i &lt; 12; i += 1) {
      const x = 74 + (i % 4) * 115;
      const y = 154 + Math.floor(i / 4) * 112;
      const active = i === 5;
      sms += `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;92&quot; height=&quot;78&quot; rx=&quot;12&quot; class=&quot;${active ? &#x27;s3&#x27; : &#x27;s2&#x27;}&quot;/&gt;&lt;text x=&quot;${x + 46}&quot; y=&quot;${y + 34}&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;SM ${i}&lt;/text&gt;&lt;text x=&quot;${x + 46}&quot; y=&quot;${y + 58}&quot; text-anchor=&quot;middle&quot; class=&quot;tiny&quot;&gt;${active ? &#x27;运行本例 Block&#x27; : &#x27;运行其他 Block&#x27;}&lt;/text&gt;`;
    }

  function drawLoad(step) {

      ${arrow(798, 244, 876, 244, &#x27;切换&#x27;, &#x27;flow2&#x27;)}

  function drawReduce(step) {

      &lt;rect x=&quot;894&quot; y=&quot;380&quot; width=&quot;220&quot; height=&quot;142&quot; rx=&quot;18&quot; class=&quot;s2&quot;/&gt;

      &lt;text x=&quot;1004&quot; y=&quot;458&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;Shared Memory 更靠近 SM&lt;/text&gt;
      &lt;text x=&quot;1004&quot; y=&quot;490&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;减少片外往返与等待&lt;/text&gt;

  function drawStore(step) {
    return `${defs(step)}${header(step, 6)}

      ${box(82, 212, 210, 154, &#x27;Thread 0 寄存器&#x27;, [&#x27;最终值：8256&#x27;, &#x27;其他线程已经结束本轮工作&#x27;], &#x27;s4&#x27;)}
      ${arrow(292, 289, 390, 289, &#x27;Store 指令&#x27;, &#x27;flow4&#x27;)}
      ${box(390, 212, 210, 154, &#x27;Load / Store 单元&#x27;, [&#x27;把一个标量结果送出 SM&#x27;, &#x27;中间 128 个值无需写回 HBM&#x27;], &#x27;s6&#x27;)}
      ${arrow(600, 289, 698, 289, &#x27;片上路径&#x27;, &#x27;flow2&#x27;)}
      ${box(698, 212, 186, 154, &#x27;L2 Cache&#x27;, [&#x27;GPU 全体 SM 共享&#x27;, &#x27;连接显存控制器&#x27;], &#x27;s2&#x27;)}
      ${arrow(884, 289, 982, 289, &#x27;写回&#x27;, &#x27;flow1&#x27;)}
      ${box(982, 212, 170, 154, &#x27;HBM out[0]&#x27;, [&#x27;8256&#x27;], &#x27;s1&#x27;)}

      &lt;text x=&quot;600&quot; y=&quot;480&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;中间步骤停留在寄存器和 Shared Memory，避免反复往返片外 HBM。&lt;/text&gt;
      ${pill(236, 532, 230, &#x27;输入流量：128 个元素&#x27;)}${pill(486, 532, 230, &#x27;片上中间计算&#x27;)}${pill(736, 532, 230, &#x27;输出流量：1 个元素&#x27;)}
      ${footer(&#x27;这一条写回路径解释了文章的原则：可复用的中间数据应尽量留在内存层级的高处。&#x27;)}`;
  }

  function drawOverview(step) {
    return `${defs(step)}${header(step, 7)}
      &lt;rect x=&quot;48&quot; y=&quot;112&quot; width=&quot;1104&quot; height=&quot;494&quot; rx=&quot;24&quot; class=&quot;frame&quot;/&gt;
      ${box(76, 180, 194, 172, &#x27;HBM&#x27;, [&#x27;x[0…127]&#x27;, &#x27;片外 · 大容量&#x27;, &#x27;初次读取代价最高&#x27;], &#x27;s1&#x27;)}
      ${arrow(270, 266, 346, 266, &#x27;128 个数&#x27;, &#x27;flow1&#x27;)}
      ${box(346, 180, 170, 172, &#x27;L2&#x27;, [&#x27;全 GPU 共享&#x27;, &#x27;连接所有 SM&#x27;, &#x27;缓存近期数据&#x27;], &#x27;s2&#x27;)}
      ${arrow(516, 266, 592, 266, &#x27;&#x27;, &#x27;flow2&#x27;)}
      ${box(592, 146, 316, 240, &#x27;SM&#x27;, [&#x27;4 个 Warp × 32 线程&#x27;, &#x27;寄存器保存线程私有值&#x27;, &#x27;Shared Memory 完成 Block 内归约&#x27;, &#x27;Warp 调度器隐藏等待&#x27;], &#x27;s3&#x27;)}
      ${arrow(908, 266, 984, 266, &#x27;1 个结果&#x27;, &#x27;flow4&#x27;)}
      ${box(984, 180, 140, 172, &#x27;HBM&#x27;, [&#x27;out[0]&#x27;, &#x27;8256&#x27;, &#x27;最终写回&#x27;], &#x27;s1&#x27;)}
      &lt;path d=&quot;M 244 422 L 956 422&quot; class=&quot;line&quot;/&gt;
      &lt;text x=&quot;600&quot; y=&quot;454&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;速度层级：寄存器 → Shared Memory / L1 → L2 → HBM&lt;/text&gt;
      &lt;text x=&quot;600&quot; y=&quot;490&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;越靠近 SM：容量越小、速度越快；越靠近 HBM：容量越大、访问等待越长。&lt;/text&gt;
      &lt;rect x=&quot;120&quot; y=&quot;526&quot; width=&quot;430&quot; height=&quot;54&quot; rx=&quot;13&quot; class=&quot;s1&quot;/&gt;
      &lt;text x=&quot;335&quot; y=&quot;559&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;本例前半段：读取量大，容易受内存流量限制&lt;/text&gt;
      &lt;rect x=&quot;650&quot; y=&quot;526&quot; width=&quot;430&quot; height=&quot;54&quot; rx=&quot;13&quot; class=&quot;s2&quot;/&gt;
      &lt;text x=&quot;865&quot; y=&quot;559&quot; text-anchor=&quot;middle&quot; class=&quot;body&quot;&gt;归约阶段：片上复用，计算与同步更重要&lt;/text&gt;
      ${footer(&#x27;一张图记住：SM 调度 Warp；Warp 驱动线程；数据在 HBM 与片上小内存之间流动。&#x27;)}`;
  }

  function esc(value) {
    return String(value).replace(/[&amp;&lt;&gt;&quot;&#x27;]/g, ch =&gt; ({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#039;&#x27;}[ch]));
  }

  function render(id) {
    const keys = Object.keys(steps);
    const selected = steps[id] ? id : keys[0];
    const step = steps[selected];
    svg.innerHTML = step.draw(step);
    status.textContent = step.detail;
    buttons.forEach(button =&gt; {
      const active = button.dataset.step === selected;
      button.setAttribute(&#x27;aria-pressed&#x27;, String(active));
      button.classList.toggle(&#x27;btn-primary&#x27;, active);
    });
    if (window.location.hash !== `#${selected}`) history.replaceState(null, &#x27;&#x27;, `#${selected}`);
  }

  buttons.forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; render(button.dataset.step)));
  window.addEventListener(&#x27;hashchange&#x27;, () =&gt; render(window.location.hash.slice(1)));
  const initial = window.location.hash.slice(1);
  render(steps[initial] ? initial : &#x27;task&#x27;);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
